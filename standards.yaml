standards:
  - name: "I(A) Knowledge of the Law"
    tag: "1a"
    text: "Members and Candidates must understand and comply with all applicable laws, rules, and regulations (including the CFA Institute Code of Ethics and Standards of Professional Conduct) of any government, regulatory organization, licensing agency, or professional association governing their professional activities. In the event of conflict, Members and Candidates must comply with the more strict law, rule, or regulation. Members and Candidates must not knowingly participate or assist in and must dissociate from any violation of such laws, rules, or regulations."
    examples:
    - title: "Example 1 (Notification of Known Violations)"
      text: "Allen works for a brokerage firm and is responsible for an underwriting of securities. A senior manager for an issuing company gives Allen information indicating that the financial statements Allen filed with the regulator overstate the issuer’s earnings. Allen seeks the advice of the brokerage firm’s general counsel, who states that it would be difficult for the regulator to prove that Allen has been involved in any wrongdoing."
      comment: "Although it is recommended that members and candidates seek the advice of legal counsel, the reliance on such advice does not absolve a member or candidate from the requirement to comply with the law or regulation. Allen should report this situation to his supervisor, seek an independent legal opinion, and determine whether the regulator should be notified of the error."
    - title: "Example 2 (Dissociating from a Violation)"
      text: "Brown’s employer, an investment banking firm, is the principal underwriter for an issue of convertible debentures by the Courtney Company. Brown discovers that the Courtney Company concealed severe third-quarter losses in its foreign operations. The preliminary prospectus was already distributed."
      comment: "Knowing that the preliminary prospectus is misleading, Brown should report his findings to the appropriate supervisory persons in his firm. If the matter is not remedied and Brown’s employer does not dissociate from the underwriting, Brown must sever all his connections with the underwriting. Brown should also seek legal advice to determine whether additional reporting or other action should be taken."
    - title: "Example 3 (Dissociating from a Violation)"
      text: "Washington’s firm advertises its past performance record by showing the 10-year return of a composite of its client accounts. Washington discovers, however, that the composite omits the performance of accounts that left the firm during the 10-year period, whereas the description of the composite indicates the inclusion of all firm accounts. This omission led to an inflated performance figure. Washington is asked to use promotional material that includes the erroneous performance number when soliciting business for the firm."
      comment: "Misrepresenting performance is a violation of the Code and Standards. Although she did not calculate the performance herself, Washington will assist in violating Standard I(A) if she were to use the inflated performance number when soliciting clients. She must dissociate herself from the activity. If discussing the misleading number with the person responsible is not an option for correcting the problem, she must bring the situation to the attention of her supervisor or the compliance department at her firm. If her firm is unwilling to recalculate performance, she must refrain from using the misleading promotional material and should notify the firm of her reasons. If the firm insists that she use the material, she should consider whether her obligation to dissociate from the activity requires her to seek other employment."
    - title: "Example 4 (Following the Highest Requirements)"
      text: "Collins is an investment analyst for a major Wall Street brokerage firm. He works in a developing country with a rapidly modernizing economy and a growing capital market. Local securities laws are minimal—in form and content—and include no punitive prohibitions against insider trading."
      comment: "Collins must abide by the requirements of the Code and Standards, which are stricter than the rules of the developing country. In handling material nonpublic information that comes into his possession, he must follow Standard II(A) Material Nonpublic Information."
    - title: "Example 5 (Following the Highest Requirements)"
      text: "Jameson works for a multinational investment adviser based in the United States. Jameson lives and works as a registered investment adviser in the tiny but wealthy island nation of Karramba. Karramba’s securities laws state that no investment adviser registered and working in that country can participate in initial public offerings (IPOs). Jameson, believing that, as a US citizen working for a US-based company, she should comply only with US law, ignored this Karrambian law. In addition, Jameson believes that as a charterholder, as long as she adheres to the Code and Standards requirement that she disclose her participation in any IPO to her employer and clients when such ownership creates a conflict of interest, she is meeting the highest ethical requirements."
      comment: "Jameson is in violation of Standard I(A). As a registered investment adviser in Karramba, Jameson is prevented by Karrambian securities law from participating in IPOs regardless of the law of her home country. In addition, because the law of the country where she works is stricter than the Code and Standards, she must follow the stricter requirements of the local law rather than the requirements of the Code and Standards."
    - title: "Example 6 (Failure to Maintain Knowledge of the Law)"
      text: "White communicates with clients and potential clients through social media. She posts investment information, including performance reports and investment opinions and recommendations, along with brief announcements and opinions (e.g., “Prospects for future growth of XYZ company look good! #makingmoney4U”). Prior to White’s use of social media, the local regulator issued new requirements and guidance governing online electronic communication. White’s communications conflict with the recent regulatory announcements."
      comment: "White is in violation of Standard I(A) because her communications do not comply with the existing applicable regulation governing use of social media. White must be aware of the evolving legal requirements pertaining to areas of the financial services industry that apply to her. She should seek guidance from appropriate, knowledgeable, and reliable sources, such as her firm’s compliance department, external service providers, or outside counsel, unless she diligently follows legal and regulatory trends affecting her professional responsibilities. Having appropriate knowledge of the laws directly applicable to her professional activities is also required by Standard I(E)Competence." 
    - title: "Example 7 (Knowledge of Applicable Law)"
      text: "Scherzer is a portfolio manager for National Investment Advisors (NIA). He, along with many other NIA personnel, assists in preparing for the firm’s annual audit of financial reports required by local regulations. While gathering and preparing material to assist Strasberg, the firm’s chief financial officer (CFO), and her audit team in fulfilling the firm’s annual regulatory reporting requirements, Scherzer neglects to properly collect and disclose certain information required by the regulations."
      comment: "Although Scherzer occasionally assists with the firm’s financial audit, his primary professional responsibilities relate to portfolio management of client accounts. As such, Standard I(A) does not require Scherzer to have detailed knowledge of the financial audit regulations applicable to his firm. Strasberg, as the CFO and the person responsible for the internal audit team, would be required by Standard I(A) to understand and comply with the audit regulations. Scherzer can rely on Strasberg to understand what information is required by the regulations and give him advice on how to properly gather and disclose that information."
  - name: "I(B) Independence and Objectivity"
    tag: "1b"
    text: "Members and Candidates must use reasonable care and judgment to achieve and maintain independence and objectivity in their professional activities. Members and Candidates must not offer, solicit, or accept any gift, benefit, compensation, or consideration that reasonably could be expected to compromise their own or another’s independence and objectivity."
    examples:
    - title: "Example 1 (Travel Expenses)"
      text: "Taylor, a mining analyst with Bronson Brokers, is invited by Precision Metals to join a group of his peers in a tour of mining facilities in several western US states. The company arranges for chartered group flights from site to site and for modest accommodations in Spartan Motels, the only chain with accommodations near the mines, for three nights. Taylor allows Precision Metals to pick up his tab, as do the other analysts, with one exception—Adams, an employee of a large trust company who insists on following his company’s policy and paying for his hotel room himself."
      comment: "The policy of the company where Adams works complies closely with Standard I(B) by avoiding even the appearance of a conflict of interest, but Taylor and the other analysts did not necessarily violate Standard I(B). In general, when allowing companies to pay for travel and/or accommodations in these circumstances, members and candidates must use their judgment. They must be on guard that such arrangements do not impinge on a member’s or candidate’s independence and objectivity. In this example, the trip was strictly for business and Taylor was not accepting irrelevant or lavish hospitality. The itinerary required chartered flights, for which analysts were not expected to pay. The accommodations were modest. In the final analysis, members and candidates must consider both whether they can remain objective and whether their integrity might be perceived by their clients to have been compromised."
    - title: "Example 2 (Research Independence)"
      text: "Dillon, an analyst in the corporate finance department of an investment services firm, is making a presentation to a potential new business client that includes the promise that her firm will provide full research coverage of the potential client."
      comment: "Dillon may agree to provide research coverage, but she must not commit her firm’s research department to providing a favorable recommendation. The firm’s recommendation (favorable, neutral, or unfavorable) must be based on an independent and objective investigation and analysis of the company and its securities."
    - title: "Example 3 (Research Independence and Intrafirm Pressure)"
      text: "Fritz is an equity analyst at Hilton Brokerage who covers the mining industry. He has concluded that the stock of Metals & Mining is overpriced at its current level, but he is concerned that a negative research report will hurt the good relationship between Metals & Mining and the investment banking division of his firm. In fact, a senior manager of Hilton Brokerage just sent him a copy of a proposal his firm made to Metals & Mining to underwrite a debt offering. Fritz needs to produce a report right away and is concerned about issuing a less-than-favorable rating."
      comment: "Fritz’s analysis of Metals & Mining must be objective and based solely on consideration of company fundamentals. Any pressure from other divisions of his firm is inappropriate. This conflict could have been eliminated if, in anticipation of the offering, Hilton Brokerage had placed Metals & Mining on a restricted list."
    - title: "Example 4 (Research Independence and Issuer Relationship Pressure)"
      text: "Fritz is an equity analyst at Hilton Brokerage who covers the mining industry. Fritz has concluded that Metals & Mining stock is overvalued at its current level, but he is concerned that a negative research report might jeopardize a close rapport that he has nurtured over the years with Metals & Mining’s CEO, chief financial officer, and investment relations officer. Fritz is concerned that a negative report might also result in management retaliation—for instance, cutting him off from participating in conference calls when a quarterly earnings release is made, denying him the ability to ask questions on such calls, and/or denying him access to top management for arranging group meetings between Hilton Brokerage clients and top Metals & Mining managers."
      comment: "Fritz’s analysis must be objective and based solely on consideration of company fundamentals. Any pressure from Metals & Mining is inappropriate. To support the integrity of his conclusions, Fritz should fully document his work, including how his investment recommendation is based on relative valuation."
    - title: "Example 5 (Research Independence and Sales Pressure)"
      text: "In her role supporting the sales effort of a corporate bond department, Warner offers credit guidance to fixed-income investors. Her compensation is closely linked to the performance of the corporate bond department. Near the quarter’s end, Warner’s firm has a large inventory position in the bonds of Milton, Ltd., and has been unable to sell the bonds because of Milton’s recent announcement of an operating problem. Salespeople have asked her to contact large clients to push the bonds."
      comment: "Unethical sales practices create significant potential violations of the Code and Standards. Warner’s opinion of the Milton bonds must not be affected by internal pressure or compensation. In this case, Warner must refuse to push the Milton bonds unless she is able to justify that the market price has already adjusted for the operating problem."
    - title: "Example 6 (Research Independence and Prior Coverage)"
      text: "Jorund, a securities analyst following airline stocks, is a rising star at her firm. Her boss has been carrying a “buy” recommendation on International Airlines and asks Jorund to take over coverage of the airline. He tells Jorund that under no circumstances should the prevailing buy recommendation be changed."
      comment: "Comment: Jorund must be independent and objective in her analysis of International Airlines. If she believes that her boss’s instructions have compromised her, she has two options: She can tell her boss that she cannot cover the company under these constraints, or she can take over coverage of the company, reach her own independent conclusions, and if they conflict with her boss’s opinion, share the conclusions with her boss or other supervisors in the firm so that they can make appropriate recommendations. Jorund must issue only recommendations that reflect her independent and objective opinion."
    - title: "Example 7 (Gifts and Entertainment from Related Parties)"
      text: "Grant directs a large amount of his commission business to a New York–based brokerage house. In appreciation for all the business, the brokerage house gives Grant two tickets to the World Cup in South Africa, two nights at a nearby resort, several meals, and transportation via limousine to the game."
      comment: "Comment: Grant violated Standard I(B) because accepting these substantial gifts may impede his independence and objectivity. Members and candidates must not solicit or accept gifts, contributions, or other compensation that affects their independence and objectivity or that reasonably could be expected to influence their decision-making process. Best practice is to avoid situations that might cause or be perceived to cause a loss of independence or objectivity in recommending investments or taking investment action. By accepting the trip, Grant created a conflict of interest and opened himself up to the accusation that he may give the broker favored treatment in return. At a minimum, Grant must disclose this conflict to his employer and clients."
    - title: "Example 8 (Gifts and Entertainment from Clients)"
      text: "Green manages the portfolio of Knowlden, a client of Tisbury Investments. Green achieves an annual return for Knowlden that is consistently better than that of the benchmark she and the client previously agreed to. As a reward, Knowlden offers Green two tickets to Wimbledon and the use of Knowlden’s flat in London for a week. Green discloses this gift to her supervisor at Tisbury."
      comment: "Comment: Green is in compliance with Standard I(B) because she disclosed the gift from one of her clients. Members and candidates may accept bonuses or gifts from clients as long as they disclose them to their employer because gifts in a client relationship are deemed less likely to affect a member’s or candidate’s objectivity and independence than gifts in other situations. Disclosure is required, however, so that supervisors can monitor such situations to guard against employees favoring a gift-giving client to the detriment of other fee-paying clients (such as by allocating a greater proportion of IPO stock to the gift-giving client’s portfolio)."
    - title: "Example 9 (Travel Expenses from External Managers)"
      text: "Wayne is the investment manager of the Franklin City Employee Pension Plan. He recently completed a successful search for a firm to manage the foreign equity allocation of the plan’s diversified portfolio. He followed the plan’s standard procedure of seeking presentations from a number of qualified firms and recommended that his board select Penguin Advisers because of its experience, well-defined investment strategy, and performance record. The firm claims compliance with the Global Investment Performance Standards (GIPS®) and has been verified. Following the selection of Penguin, a reporter from the Franklin City Record calls to ask whether there was any connection between this action and the fact that Penguin Advisers was one of the sponsors of an “investment fact-finding trip to Asia” that Wayne made earlier in the year. The trip was one of several conducted by the Pension Investment Academy, which had arranged the itinerary of meetings with economic, government, and corporate officials in major cities in several Asian countries. The Pension Investment Academy obtains support for the cost of these trips from a number of investment managers, including Penguin Advisers; the Academy then pays the travel expenses of the various pension plan managers on the trip and provides all meals and accommodations. The president of Penguin Advisers was also one of the travelers on the trip."
      comment: "Although Wayne can probably put to good use the knowledge he gained from the trip when selecting external portfolio managers and in other areas of managing the pension plan, his recommendation of Penguin Advisers may be tainted by the possible conflict incurred when he participated in the international trip partly paid for by Penguin Advisers and when he was in the daily company of the president of Penguin Advisers. To avoid violating Standard I(B), Wayne’s basic expenses for travel and accommodations should have been paid by his employer or the pension plan; contact with the president of Penguin Advisers should have been limited to informational or educational events only; and the trip, the organizer, and the sponsor should have been made a matter of public record."
    - title: "Example 10 (Research Independence and Compensation Arrangements)"
      text: "Herrero recently left his job as a research analyst for a large investment adviser. While looking for a new position, he was hired as a contractor by an investor relations firm to write a research report on one of its clients, a small educational software company. The investor relations firm hopes to generate investor interest in the technology company. The firm will pay Herrero a flat fee plus a bonus if any new investors buy stock in the company as a result of Herrero’s report."
      comment: "If Herrero accepts this payment arrangement, he will be in violation of Standard I(B) because the compensation arrangement can reasonably be expected to compromise his independence and objectivity. Herrero will receive a bonus for attracting investors, which provides an incentive to draft a positive report regardless of the facts and to ignore or play down any negative information about the company. Herrero should accept only a flat fee that is not tied to the conclusions or recommendations of the report. Issuer-paid research that is objective and unbiased is acceptable under certain circumstances as long as the analyst takes steps to maintain his or her objectivity and includes in the report proper disclosures regarding potential conflicts of interest."
    - title: "Example 11 (Influencing Manager Selection Decisions)"
      text: "Mandel is a senior portfolio manager for ZZYY Capital Management who oversees a team of investment professionals who manage labor union pension funds. A few years ago, ZZYY sought to win a competitive asset manager search to manage a significant allocation of the pension fund of the United Doughnut and Pretzel Bakers Union (UDPBU). UDPBU’s investment board is chaired by Gomez, a recognized key decision maker and long-time leader of the union. To improve ZZYY’s chances of winning the competition, Mandel made significant monetary contributions to Gomez’s union reelection campaign fund. Even after ZZYY was hired as a primary manager of the pension fund, Mandel believed that his firm’s position was not secure. Mandel continued to contribute to Gomez’s reelection campaign fund and lavishly entertained the union leader and his family at top restaurants on a regular basis. All of Mandel’s outlays were routinely handled as marketing expenses reimbursed by ZZYY’s expense accounts and were disclosed to his senior management as being instrumental in maintaining a strong close relationship with an important client."
      comment: "Mandel not only offered but actually gave monetary gifts, benefits, and other considerations that reasonably could be expected to compromise Gomez’s objectivity. Therefore, Mandel was in violation of Standard I(B)."
    - title: "Example 12 (Fund Manager Relationships)"
      text: "Scott is a performance analyst who is responsible for analyzing the performance of external managers for her firm. While completing her quarterly analysis, Scott notices a change in one manager’s reported composite construction. The change concealed the bad performance of a particularly large account by placing that account into a new residual composite. This change allowed the manager to remain at the top of the list of manager performance. Scott knows her firm has a large allocation to this manager, and the fund’s manager is a close personal friend of the CEO. She needs to deliver her final report but is concerned about pointing out the composite change."
      comment: "Scott would be in violation of Standard I(B) if she did not disclose the change in her final report. The analysis of managers’ performance must not be influenced by personal relationships or the size of the allocation to the outside managers. By not including the change, Scott would not be providing an independent analysis of the performance metrics for her firm."
    - title: "Example 13 (Intrafirm Pressure)"
      text: "Stein is head of performance measurement for her firm. During the last quarter, many members of the organization’s research department were removed because of the poor quality of their recommendations. The subpar research caused one larger account holder to experience significant underperformance, which resulted in the client withdrawing his money after the end of the quarter. The head of sales requests that Stein remove this account from the firm’s performance composite because the performance decline can be attributed to the departed research team and not the client’s adviser."
      comment: "Pressure from other internal departments can create situations that cause a member or candidate to violate the Code and Standards. Stein must maintain her independence and objectivity and refuse to exclude specific accounts from the firm’s performance composites to which they belong. As long as the client invested under a strategy similar to that of the defined composite, it cannot be excluded because of the poor stock selections that led to the underperformance and asset withdrawal."
  - name: "I(C) Misrepresentation"
    tag: "1c"
    text: "Members and Candidates must not knowingly make any misrepresentations relating to investment analysis, recommendations, actions, or other professional activities."
    examples:
    - title: "Example 1 (Representing the Firm’s Abilities)"
      text: "Rogers is a partner at Rogers and Black, a small firm offering investment advisory services. She assures a prospective client who inherited a portfolio worth US$1 million that “we can perform all the financial and investment services you need.” Rogers and Black is well equipped to provide investment advice but, in fact, cannot provide a full array of financial and investment services, such as tax planning."
      comment: "Rogers violated Standard I(C) by orally misrepresenting the services her firm can perform for the prospective client. Using vague, imprecise, and general language such as “all the financial and investment services you need” oversells and misrepresents the services she and her firm can provide. She must limit herself to describing the range of investment advisory services Rogers and Black can provide and offer to help the client obtain elsewhere the financial and investment services that her firm cannot provide."
    - title: "Example 2 (Disclosure of Issuer-Paid Research)"
      text: "McGuire is an issuer-paid analyst hired by publicly traded companies to electronically promote their stocks. McGuire creates a website that promotes his research efforts as a seemingly independent analyst. McGuire posts a profile and a strong buy recommendation for each company on the website, indicating that the stock is expected to increase in value. He does not disclose the contractual relationships with the companies he covers on his website, in the research reports he issues, or in the statements he makes about the companies in internet chatrooms."
      comment: "McGuire violated Standard I(C) because the internet site is misleading to potential investors. Even if the recommendations are valid and supported with thorough research, his omissions regarding the true relationship between himself and the companies he covers constitute a misrepresentation. McGuire also violated Standard VI(A) Avoid or Disclose Conflicts, by not disclosing the existence of an arrangement with the companies from which he receives compensation in exchange for his services."
    - title: "Example 3 (Correction of Unintentional Errors)"
      text: "Yao is responsible for the creation and distribution of the marketing materials for his firm, which claims compliance with the GIPS standards. Yao creates and distributes a presentation of performance for the firm’s Asian Equity Composite that states the composite has ¥350 billion in assets. In fact, the composite has only ¥35 billion in assets, and the higher figure on the presentation is a result of a typographical error. Nevertheless, the erroneous material is distributed to a number of clients before Yao catches the mistake."
      comment: "Once the error is discovered, Yao must take steps to cease distribution of the incorrect material and correct the error by informing those who have received the erroneous information. Because Yao did not knowingly make the misrepresentation, however, he did not violate Standard I(C). Since his firm claims compliance with the GIPS standards, he must also comply with the GIPS standards requirements addressing the treatment of material errors."
    - title: "Example 4 (Not Correcting Known Errors)"
      text: "Muhammad is the president of an investment management firm. The promotional material for the firm, created by the firm’s marketing department, incorrectly claims that Muhammad has an advanced degree in finance from a prestigious business school in addition to the CFA designation. Although Muhammad attended the school for a short period of time, he did not receive a degree. Over the years, Muhammad and others in the firm have distributed this material to numerous prospective clients and consultants."
      comment: "Even though Muhammad may not have been directly responsible for the misrepresentation of his credentials in the firm’s promotional material, he should have known of the misrepresentation because he used this material numerous times over an extended period, and therefore, he violated Standard I(C). Once Muhammad became aware of the errors in the promotional material, he should have corrected the information. Best practice would be for Muhammad to provide correct information to any recipients of the erroneous material."
    - title: "Example 5 (Plagiarism)"
      text: "Grant, a research analyst for a Canadian brokerage firm, has specialized in the Canadian mining industry for the past 10 years. She recently read an extensive research report on Jefferson Mining, Ltd., by Barton, an analyst at a different firm. Barton provided extensive statistics on the mineral reserves, production capacity, selling rates, and marketing factors affecting Jefferson’s operations. He also noted that initial drilling results on a new ore body, which had not been made public, might show the existence of mineral zones that could increase the life of Jefferson’s main mines, but Barton cited no specific data as to the initial drilling results. Grant called an officer of Jefferson, who gave her the initial drilling results over the telephone. The data indicated that the expected life of the main mines would be tripled. Grant added these statistics to Barton’s report and circulated it as her own report within her firm."
      comment: "Grant plagiarized Barton’s report by reproducing large parts of it in her own report without acknowledgment and, therefore, violated Standard I(C)."
    - title: "Example 6 (Misrepresentation of Information)"
      text: "When Marks sells mortgage-backed derivatives called “interest-only strips” (IOs) to public pension plan clients, she describes them as “guaranteed by the US government.” Purchasers of the IOs are entitled only to the interest stream generated by the mortgages, however, not the notional principal itself. One particular municipality’s investment policies and local law require that securities purchased by its public pension plans be guaranteed by the US government. Although the underlying mortgages are guaranteed, neither the investor’s investment nor the interest stream on the IOs is guaranteed. When interest rates decline, causing an increase in prepayment of mortgages, interest payments to the IOs’ investors decline, and these investors lose a portion of their investment."
      comment: "Marks violated Standard I(C) by misrepresenting the terms and character of the investment."
    - title: "Example 7 (Potential Information Misrepresentation)"
      text: "Abdrabbo manages the investments of several high-net-worth individuals in the United States who are approaching retirement. Abdrabbo advises these individuals that a portion of their investments should be moved from equity to bank-sponsored certificates of deposit and money market accounts so that the principal will be “guaranteed” up to a certain amount. The interest is not guaranteed."
      comment: "Although there is risk that the institution offering the certificates of deposit and money market accounts could go bankrupt, in the United States, these accounts are insured by the US government through the Federal Deposit Insurance Corporation. Therefore, using the term “guaranteed” in this context is appropriate if the amount is within the government-insured limit. Abdrabbo must explain these facts to the clients."
    - title: "Example 8 (Plagiarism)"
      text: "Swanson is a senior analyst in the investment research department of Ballard and Company. Apex Corporation has asked Ballard to assist in acquiring the majority ownership of stock in the Campbell Company, a financial consulting firm, and to prepare a report recommending that stockholders of Campbell agree to the acquisition. Another investment firm, Davis and Company, had already prepared a report for Apex analyzing both Apex and Campbell and recommending an exchange ratio. Apex has given the Davis report to Ballard officers, who have passed it on to Swanson. Swanson reviews the Davis report and other available material on Apex and Campbell. From his analysis, he concludes that the common stocks of Campbell and Apex represent good value at their current prices; he believes, however, that the Davis report does not consider all the factors a Campbell stockholder would need to know to make a decision. Swanson reports his conclusions to the partner in charge, who tells him to “use the Davis report, change a few words, sign your name, and get it out.”"
      comment: "If Swanson does as requested, he will violate Standard I(C). He could refer to those portions of the Davis report that he agrees with if he identifies Davis as the source; he could then add his own analysis and conclusions to the report before signing and distributing it."
    - title: "Example 9 (Plagiarism)"
      text: "Browning, a quantitative analyst for Double Alpha, Inc., is excited after returning from a seminar. In that seminar, Jorrely, a well-publicized quantitative analyst at a national brokerage firm, discussed one of his new models in great detail, and Browning is intrigued by the new concepts. He proceeds to test the model, making some minor changes but retaining the concepts, until he produces some very positive results. Browning quickly announces to his supervisors at Double Alpha that he has discovered a new model and that clients and prospective clients should be informed of this positive finding as ongoing proof of Double Alpha’s continuing innovation and ability to add value."
      comment: "Although Browning tested Jorrely’s model on his own and even slightly modified it, he must still acknowledge the original source of the idea. Browning can certainly take credit for the final, practical results; he can also support his conclusions with his own test. The credit for the innovative thinking, however, must be given to Jorrely."
    - title: "Example 10 (Plagiarism)"
      text: "Zubia would like to include in his firm’s marketing materials some “plain-language” descriptions of various concepts, such as the price-to-earnings (P/E) multiple and why standard deviation is used as a measure of risk. The descriptions come from other sources, but Zubia wishes to use them without reference to the original authors."
      comment: "Copying verbatim any material without acknowledgment, including plain-language descriptions of the P/E multiple and standard deviation, violates Standard I(C). Even though these concepts are general, best practice would be for Zubia to describe them in his own words or cite the sources from which the descriptions are quoted. Members and candidates would be violating Standard I(C) if they either were responsible for creating marketing materials without attribution or knowingly used plagiarized materials."
    - title: "Example 11 (Plagiarism)"
      text: "Through a mainstream media outlet, Schneider learns about a study that she would like to cite in her research. She questions whether she should cite both the mainstream intermediary source and the author of the study itself when using that information."
      comment: "In all instances, a member or candidate must cite the actual source of the information. Best practice for Schneider would be to obtain the information directly from the author and review it before citing it in a report. In that case, Schneider would not need to report how she found out about the information. For example, suppose Schneider read in the Financial Times about a study issued by CFA Institute; best practice for Schneider would be to obtain a copy of the study from CFA Institute, review it, and then cite it in her report. If she does not use any interpretation of the report from the Financial Times and the newspaper does not add value to the report itself, the newspaper is merely a conduit to the original information and does not need to be cited. If she does not obtain the report and review the information, Schneider runs the risk of relying on second-hand information that may misstate facts. If, for example, the Financial Times erroneously reported some information from the original CFA Institute study and Schneider copied that erroneous information, she would be including misinformation in her research. To avoid a potential violation of Standard I(C), Schneider must obtain the complete study from its original author and cite only that author or use the information provided by the intermediary and cite both sources."
    - title: "Example 12 (Misrepresentation of Information)"
      text: "Ostrowski runs a two-person investment management firm. His firm subscribes to a service from a large investment research firm that provides research reports that can be repackaged by smaller firms for those firms’ clients. Ostrowski’s firm distributes these reports to clients as its own work."
      comment: "Ostrowski may rely on third-party research that has a reasonable and adequate basis, but he must not imply that he is the author of such research. If he does, Ostrowski is misrepresenting the extent of his work in a way that misleads the firm’s clients or prospective clients."
    - title: "Example 13 (Misrepresentation of Information)"
      text: "Stafford is part of a team at Appleton Investment Management responsible for managing a pool of assets for Open Air Bank, which distributes structured securities to offshore clients. He becomes aware that Open Air is promoting the structured securities as a much less risky investment than the investment management policy followed by himself and the team to manage the original pool of assets. Also, Open Air has procured an independent rating for the pool that significantly overstates the quality of the investments. Stafford communicates his concerns to his supervisor, who responds that Open Air owns the product and is responsible for all marketing and distribution. Stafford’s supervisor goes on to say that the product is outside the US regulatory regime that Appleton follows and that all risks of the product are disclosed at the bottom of page 184 of the prospectus."
      comment: "As a member of the investment team, Stafford is qualified to recognize the degree of accuracy of the materials that characterize the portfolio, and he is correct to be concerned about Appleton’s responsibility for a misrepresentation of the risks. Stafford must continue to pursue the issue of Open Air’s inaccurate promotion with Appleton’s compliance personnel and management. Stafford cannot be part of promoting, recommending, or distributing information about securities that he considers misleading without potentially violating Standard I(C)."
    - title: "Example 14 (Misrepresenting Composite Construction)"
      text: "Palmer is head of performance for an investment manager. When asked to provide performance numbers to databases, he avoids disclosing that the firm excludes from composites accounts that have underperformed their benchmark. The composite returns reported to the databases, although accurate for the accounts that have not underperformed their benchmark, do not present a true representation of the investment manager’s track record."
      comment: "“Cherry-picking” accounts to include in either published reports or information provided to databases or other external parties conflicts with Standard I(C). Selecting only the best-performing accounts to include in a track record materially misrepresents the firm’s composite results. Palmer should work with his firm to strengthen its reporting practices concerning composite construction to avoid misrepresenting the firm’s track record or the quality of the information being provided." 
    - title: "Example 15 (Presenting Out-of-Date Information)"
      text: "Finch is a sales director at a commercial bank, where he directs the bank’s client advisers in the sale of third-party mutual funds. Each quarter, he holds a division-wide training session where he provides fact sheets on investment funds the bank is allowed to offer to clients. These fact sheets, which can be redistributed to clients, are created by the mutual fund firms and contain information about the funds, including investment strategy and target distribution rates. <...> Finch knows that some of the fact sheets are out of date; for example, one long-only fund approved the use of significant leverage last quarter as a method to enhance returns. He continues to provide the sheets to the sales team without updates because the bank has no control over the marketing material released by the mutual fund firms."
      comment: "Finch is violating Standard I(C) by providing information that misrepresents aspects of the funds. By not providing the sales team and, ultimately, the clients with the updated information, he is misrepresenting the potential risks associated with the funds with outdated fact sheets. Finch must instruct the sales team to clarify the deficiencies in the fact sheets with clients and ensure they have the most recent fund documents before accepting orders for investing in any fund."
    - title: "Example 16 (Overstating ESG Claims)"
      text: "Lowery manages the Majesty Fund, which was established in 2018 and has become one of the leading Asian environmental, social, and governance (ESG) funds. The fund’s mandate is to seek sustainable wealth creation. Lowery uses ESG scores provided by third-party rating organizations to assess potential investments for the fund. The fund declares in promotional material and client agreements that it engages in proactive engagement and proxy voting for companies owned by the fund to create sustainable growth. However, Lowery has done neither of these activities. As a result, the fund has never published its detailed engagement reports that include its engagement strategy and its outcomes. Moreover, there has been no clear communication by the fund regarding its proxy voting and its consequences."
      comment: "A firm that describes one of its funds as considering ESG factors must clearly describe what that means and not overstate the sustainability, social impact, or governance credentials of the fund. By stating that the fund would conduct proactive engagement with management and proxy voting for companies owned by the fund in order to create sustainable growth and failing to do so, Lowery misrepresented the fund and failed to meet Standard I(C)."
    - title: "Example 17 (Misleading Description of Services)"
      text: "For many years, Stafford was a partner at Lionsgate LLP, a large, full-service accounting firm that provides audit and other services, primarily in the area of investment performance. She leaves Lionsgate, with a junior associate, to form her own firm, Angelwood Analytics. Angelwood’s website, social media, and print marketing heavily emphasize Stafford’s expertise and experience and state that Stafford will be personally involved in all client work. Angelwood’s clients are small at first, but eventually Stafford attracts several large clients. To service these larger clients, she transitions to an oversight role and hires new staff to work with her longtime clients. Business becomes so successful that Stafford resorts to hiring third-party contractors that eventually provide support for over 50% of Angelwood’s work. The staff she uses are qualified, industry practice allows use of third-party contractors for the work, and Angelwood’s client agreement states that staffing decisions for each client are discretionary for the firm."
      comment: "Stafford violated Standard I(C) since her communications were not accurate and complete given the circumstances. Stafford, through her firm, did not accurately describe how her firm was staffed to perform the services that she promoted. While stating that clients could expect her knowledge and expertise, Stafford increasingly relied on junior employees and third-party staffers. While this was acceptable, she did not give a complete picture of how Angelwood will be providing investment services for clients when promoting the firm."
    - title: "Example 18 (Inaccurate, Dated Performance History)"
      text: "For the past two decades, Huggins has managed an investment advisory firm catering to retail clients and high-net-worth individuals. Overall, the investment performance history of the firm for the past five years has been satisfactory, but since the onset of the global pandemic, performance has dropped appreciably. On the firm’s website, Huggins provides the five-year performance history of the fund as a way to convince potential clients to hire his firm for advisory services. He does not update the information on the website to clarify that the performance history since the beginning of the pandemic has been less than stellar, even though that information is available."
      comment: "Huggins violated Standard I(C) by not providing accurate and timely information as part of his marketing to potential clients."
    - title: "Example 19 (Insufficient, Omitted Information)"
      text: "Hamilton is a research analyst for a private equity fund focused on impact investing in the ESG space. Hamilton creates several research reports to distribute to potential investors that generally demonstrate and describe the process the fund goes through when choosing ESG investments. The reports for potential investors are not as detailed as the research reports provided to investors once they commit to investing in the fund. After committing US$50 million to the fund, one investor, a charitable foundation, receives the more detailed reports. The chief investment officer of the foundation is unhappy that the private equity fund seems overweighted in developing technology and therefore represents a riskier investment than was indicated by the more general information initially provided by Hamilton."
      comment: "The information provided by members and candidates when meeting their responsibilities under Standard I(C) must be appropriate for the circumstances. In some circumstances, it may be appropriate to limit the information provided to potential investors, who are not yet clients, while providing more detailed disclosures and information about the investment process to those who have already entered into a client relationship. However, limiting information cannot rise to the level of misrepresenting the nature or risks of the investment. In this case, Hamilton appears to have provided only limited information about the extent to which the fund is invested in developing technology and therefore violated Standard I(C) by improperly misrepresenting the true level of risk of the investment."
    - title: "Example 20 (Misleading Description of Service, Misrepresenting Knowledge)"
      text: "The sovereign wealth fund of a developing country is seeking an investment manager to manage a portion of the fund’s assets. The fund’s directors want to take advantage of the efficiencies, innovation, and increased profitability they believe are available through the use of artificial intelligence (AI) tools in the investment process. As such, they include several questions on the use of artificial intelligence on the request for proposal (RFP) sent out to potential managers. Al-Wazir, CEO of AWZ Investment Advisers, is intent on being competitive in the fund’s manager search, even though his firm is just beginning to explore AI to enhance investment performance. Wanting to provide a seemingly thorough and knowledgeable answer, he uses ChatGPT to complete the portion of the RFP asking for a narrative of how each responding manager incorporates AI in its investment process."
      comment: "Al-Wazir violated Standard I(C) by misrepresenting his firm’s capabilities relating to AI in its investment process and using ChatGPT to respond to the RFP to hide his superficial knowledge of the topic and seem more knowledgeable than he is."
  - name: "I(D) Misconduct"
    tag: "1d"
    text: "Members and Candidates must not engage in any professional conduct involving dishonesty, fraud, or deceit or commit any act that reflects adversely on their professional reputation, integrity, or competence."
    examples:
    - title: "Example 1 (Professionalism and Competence)"
      text: "Sasserman is a trust investment officer at a bank in a small, affluent town. He enjoys lunching every day with friends at the country club, where his clients have observed him having numerous drinks. Back at work after lunch, he clearly is intoxicated while making investment decisions. His colleagues make a point of handling any business with Sasserman in the morning because they distrust his judgment after lunch."
      comment: "Sasserman’s excessive drinking at lunch and subsequent intoxication at work constitute a violation of Standard I(D) because this conduct has raised questions about his professionalism and competence. His behavior reflects poorly on him, his employer, and the investment industry."
    - title: "Example 2 (Fraud and Deceit)"
      text: "Hoffman, a security analyst at ATZ Brothers, Inc., a large brokerage house, submits reimbursement forms over a two-year period to ATZ’s self-funded health insurance program for more than two dozen bills, most of which have been altered to increase the amount due. An investigation by the firm’s director of employee benefits uncovers the inappropriate conduct. ATZ subsequently terminates Hoffman’s employment and notifies CFA Institute."
      comment: "Hoffman violated Standard I(D) because he engaged in intentional conduct involving fraud and deceit in the workplace that adversely reflected on his integrity."
    - title: "Example 3 (Fraud and Deceit)"
      text: "Brink, an analyst covering the automotive industry, is CEO of a very successful boutique investment research firm. Because she is a prominent member of the community and a CFA charterholder with years of experience in the investment industry, several local charities ask Brink to sit on their board, and she does so as a volunteer. The board of one of the charitable institutions for which Brink serves on the board decides to buy five new vans to deliver hot lunches to low-income elderly people. Brink offers to handle purchasing agreements. To pay a long-standing debt to a friend who operates an automobile dealership—and to compensate herself for her trouble—she agrees to a price 20% higher than normal and splits the surcharge with her friend."
      comment: "Brink’s volunteer work for the board of the charitable organization is a professional activity for the purposes of this standard since she serves on the board because of her status as an experienced investment analyst and CFA charterholder. Brink engaged in misconduct involving dishonesty, fraud, and misrepresentation and violated Standard I(D)."
    - title: "Example 4 (Personal Actions and Integrity)"
      text: "Garcia manages a mutual fund dedicated to socially responsible investing. She is also an environmental activist. As a result of her participation in nonviolent protests, Garcia has been arrested on numerous occasions for trespassing on the property of a large petrochemical plant that is accused of damaging the environment."
      comment: "Generally, Standard I(D) is not meant to cover legal transgressions resulting from acts of civil disobedience in support of personal beliefs, because such conduct does not reflect poorly on the member’s or candidate’s professional reputation, integrity, or competence."
    - title: "Example 5 (Misconduct as a CFA Institute Society Volunteer)"
      text: "O’Hara volunteers at his local society as an instructor at the society’s CFA exam review course for local candidates in the CFA Program. O’Hara engages in inappropriate behavior with several female candidates that includes making suggestive remarks, unwanted touching, and repeatedly asking candidates out on dates despite being rebuffed by them."
      comment: "O’Hara is in violation of Standard I(D) by engaging in sexual harassment that reflects poorly on his professional reputation and integrity. Although the actions do not take place in the workplace, O’Hara’s actions are professional conduct within the meaning of the Code and Standards because the conduct takes place as part of his work with the local society and encompasses the use of his charter and membership in the organization."
    - title: "Example 6 (Identification as a CFA Charterholder)"
      text: "Nehjer recently retired from a successful career as an economist for an investment adviser to live at her country estate. She maintains active CFA Institute membership with the organization and the local society. A multinational firm has announced its intention to open a large casino within 5 km of her estate. Local officials are balancing the positive economic impact of the casino with the negative effects it will have on the character of the community. Nehjer and her neighbors strenuously object to the casino. She publishes an open letter stating that studies have shown that the positive economic impact of gambling venues is widely overblown. She cites a number of statistics in her letter that she fabricated or altered to help make her point. She signs her name to the letter, indicating that she has a PhD and is a CFA charterholder."
      comment: "By engaging in fraud, dishonesty, and deceit in using fabricated and altered statistics in an effort to support her opinion on the casino issue, Nehjer engaged in misconduct and violated Standard I(D). Although she is retired, her actions in this case are professional conduct within the meaning of the standard because she identified herself as a CFA charterholder and explicitly used her charter in an attempt to give her analysis and opinions more credibility."
    - title: "Example 7 (Writing about Investments Outside the Workplace or Academia)"
      text: "Mewis is an analyst for an investment advisory firm and a candidate for the CFA designation. She has a strong interest in environmental protection and combatting climate change. She starts a blog in which she provides analysis of investment opportunities and makes stock picks for companies based on her evaluation of their environmental, social, and governance (ESG) factors. Her work with her employer is unrelated to ESG analysis, and her employer gives permission for her to create the blog if her ESG-related work is done on her own time and she does not identify herself as an analyst for the firm. In one of her blog posts, Mewis severely criticizes JKL company for causing substantial harm to the environment in its manufacturing process and having incompetent management. She posts on her blog that the company is likely soon to be the subject of regulatory action and private litigation that will greatly affect JKL’s profitability. Mewis has no knowledge that any of this is true but seeks to damage the company because of a personal dispute with her ex-husband, the CEO of the company."
      comment: "Mewis violated Standard I(D) by engaging in dishonesty, fraud, and deceit and in conduct that reflects adversely on her professional reputation and integrity. Although her actions are not related to her employment with the investment adviser, her conduct relates to the candidate’s involvement in the investment profession and security markets."
    - title: "Example 8 (Actions Unrelated to Professional Conduct)"
      text: "Tan is a candidate for the CFA designation and a junior analyst working in the downtown office of his employer, QRS Advisers. Because parking is extremely limited, most QRS employees commute to the company offices using public transportation. Tan wants the convenience of driving his own personal vehicle to work. He submits false documentation to government officials indicating that he has health issues that make him eligible for a disabled person parking permit. The government issues his permit, and he regularly drives to work and parks at one of the “disabled person only” spots near his office."
      comment: "While Tan’s actions involve dishonesty, fraud, deceit, and lying to government officials, his actions do not fall within the definition of professional conduct for the purposes of application of the Code and Standards. His conduct is, at most, tangential to his employment and does not implicate his participation in the CFA Program or any other affiliation with CFA Institute. As a result, while his conduct is deplorable, it is not “professional” conduct to which the Code and Standards apply."
    - title: "Example 9 (Actions Unrelated to Professional Conduct)"
      text: "Mondelo is a well-known security analyst, as well as a devoted follower of a national politician running for high public office. Prior to the election, Mondelo volunteers extensively for this politician. After election day, the opponent of Mondelo’s candidate is declared the winner. The candidate whom Mondelo supports claims that widespread election fraud took place and urges his followers to demonstrate against the election at the nation’s capital on the day his opponent is to be sworn into office. Thousands of followers, including Mondelo, follow the candidate’s direction and join the protest. A large number of demonstrators engage in violence and vandalism of government offices. During their investigation of the criminal activity, law enforcement officials interview Mondelo. He denies engaging in violence or vandalism. However, security cameras and the cell phone videos of other protesters that are posted on social media capture Mondelo fighting with police, setting fire to vehicles, and yelling racial slurs at supporters of the newly elected candidate. Mondelo’s subsequent arrest makes national news because of his prominence in the investment industry, and he is fired from his job."
      comment: "Mondelo’s violent actions during the protest and lying to government investigators about his actions involve dishonesty and deceit and call into question his integrity and character. However, although he is fired from his job, the activity is not related to his employment or his participation in the investment profession and is unrelated to his charter or any affiliation with CFA Institute. As a result, his activities related to this event do not amount to professional conduct within the meaning of the Code and Standards and are, therefore, not covered by Standard I(D). Should Mondelo be convicted of a crime that is punishable by more than one year in prison for any actions, including those that arise out of his conduct at the election protest, he could be summarily suspended from CFA Institute under the Rules of Procedure for Conduct Related to the Profession (as amended and restated 1 January 2022)."
  - name: "I(E) Competence"
    tag: "1e"
    text: "Members and Candidates must act with and maintain the competence necessary to fulfill their professional responsibilities."
    examples:
    - title: "Example 1 (Maintaining Competence)"
      text: "Lee runs a geopolitical consulting firm where she analyzes international political, social, and economic issues and developments to produce research reports for her clients, many of which are investment management firms. Lee has been closely monitoring news regarding a new multinational trade deal that has the potential to significantly boost commercial activity among countries in a certain region of the world. As soon as the trade deal was officially ratified and announced, she quickly downloaded a copy of the agreement and read it to understand its terms and impact. She also consulted with experts in the field to obtain their opinions on the impacts of the trade deal and confirm her understanding of its terms and implications."
      comment: "Lee satisfied the requirement of Standard I(E). Lee was able to write a knowledgeable and informative research report for her clients by keeping abreast of developments in her field through news reports, consulting with experts, and studying the trade deal itself to ensure that her knowledge was up to date."
    - title: "Example 2 (Improving Competence)"
      text: "Choe is the director of research at a large sell-side firm. Several of Choe’s clients asked her to incorporate environmental, social, and governance (ESG) ratings into the research reports the firm produces. Until now, the firm’s research reports have been based only on traditional quantitative metrics. Choe hires an experienced ESG analyst for her team, and she requires all research analysts, including herself, to attend ESG-focused seminars and obtain an ESG investment specialist certificate. In due time, Choe and her team begin to incorporate ESG considerations into their research reports."
      comment: "Choe extended her competence in her field by educating herself on new considerations relevant to her industry and by hiring someone with ESG expertise to fill a knowledge and skills gap before she and her team incorporated ESG considerations into the firm’s research reports. As such, Choe satisfied the requirement of Standard I(E)."
    - title: "Example 3 (Change in Role)"
      text: "Glusker is a regulatory attorney for a hedge fund who sought to transition to a sales role after impressing senior management with his strong business acumen. There is a licensing requirement involving an examination that an individual must first pass before being qualified to serve in a sales function. Among other things, the examination covers technical rules and regulations designed to ensure fairness when dealing with clients and prospects. Glusker was not familiar with these rules and regulations because he was never asked to provide guidance on them as a regulatory attorney. Glusker did not learn the material or study for the examination and instead relied on his industry knowledge to receive a passing score."
      comment: "Glusker failed to satisfy the requirement of Standard I(E). He did receive a passing score on a licensing examination, but passing the examination, by itself, is not adequate to demonstrate competency. Glusker’s failure to learn the applicable rules and regulations relating to fairness when dealing with clients and prospects means that he does not possess the required knowledge to serve in his new role, despite passing the licensing examination."
    - title: "Example 4 (Supervisory Responsibility)"
      text: "Evans is one member of a five-person team of analysts at a boutique research firm providing independent research to buy-side firms. Evans primarily covers the energy and transportation sectors. Evans’s boss leaves the firm to return to academia. Firm management promotes Evans to director of research and hires two junior analysts to replace her. Evans now has supervisory responsibility for four analysts and is responsible for all research produced by the firm. Prior to her promotion date, Evans spends a great deal of time and effort getting up to speed on the research projects of the firm that she was not involved in. Although she has never directly managed others in the past, Evans does not spend any time becoming familiar with effectively managing employees, leading teams, or compliance requirements relating to subordinates."
      comment: "Evans violated Standard I(E). Her new position demands competence in other skills, abilities, and knowledge beyond those needed for her previous position. Evans must ensure she extends her competence to cover all responsibilities of her new role. She also must now obtain the skills and knowledge needed for fulfilling her supervisory responsibility of the other analysts. This could include attending conferences or taking professional development courses on management, earning compliance credentials, and internal training on supervisory responsibility."
    - title: "Example 5 (Choosing Investments)"
      text: "Mifune is a financial planner for over 150 retail investors. Based on the investment objectives, financial circumstances, and risk tolerance of 40 of his clients, he suggests they purchase life insurance products from Vouchsafe Insurance Company. Mifune researched Vouchsafe and recommended it because it has a high credit rating, strong financials, and a decade-long history of providing affordable, safe insurance products. Within 18 months, as the result of previously unknown financial impropriety and fraud by the company’s chief financial officer, Vouchsafe goes bankrupt and the insurance contracts for thousands of policyholders become worthless. Mifune’s clients claim that he was incompetent in recommending the Vouchsafe policies."
      comment: "Assuming that Mifune’s research of Vouchsafe was thorough and appropriate, his failure to uncover the fraudulent practices of the company he recommended, which had misled the investment industry as a whole, does not, by itself, indicate that Mifune is an incompetent financial planner or violated Standard I(E)."
    - title: "Example 6 (Understanding New Investment Products)"
      text: "Halsey is a portfolio manager for a number of high-net-worth individuals. Several of his clients are impressed by the significant gains in a short time frame that they believe can be achieved by investing in cryptocurrency. They urge Halsey to include cryptocurrency products as part of their portfolios. Although Halsey is generally aware of cryptocurrency and has read several articles about the cryptocurrency investment trend in reputable newspapers, Halsey is unfamiliar with the nature of the asset or the difference between the many cryptocurrency products. Not wanting to seem out of touch with current developments in the market, lose clients, or miss out on a hot market trend by delaying an investment decision until he completes research into the asset, Halsey purchases a cryptocurrency product that has been heavily promoted through social media and online advertising for several of his clients."
      comment: "Given his limited knowledge, Halsey is not competent to invest in cryptocurrency for his clients. By hastily investing in cryptocurrency products without understanding the nature of the investment or the suitability of the investment for his clients, Halsey violated Standard I(E)."
  - name: "II(A) Material Nonpublic Information"
    tag: "2a"
    text: "Members and Candidates who possess material nonpublic information that could affect the value of an investment must not act or cause others to act on the information."
    examples:
    - title: "Example 1 (Acting on Nonpublic Information)"
      text: "Barnes, the president and controlling shareholder of the SmartTown clothing chain, decides to accept a tender offer and sell the family business at a price almost double the market price of its shares. He describes this decision to his sister (SmartTown’s treasurer), who conveys it to her daughter (who owns no stock in the family company at present), who tells her husband, Staple. Staple, however, tells his stockbroker, Halsey, who immediately buys SmartTown stock for himself."
      comment: "The information regarding the pending sale is both material and nonpublic. Staple violated Standard II(A) by communicating the inside information to his broker. Halsey also violated the standard by buying the shares on the basis of material nonpublic information."
    - title: "Example 2 (Controlling Nonpublic Information)"
      text: "Peter, an analyst with Scotland and Pierce Incorporated, is assisting his firm with a secondary offering for Bright Ideas Lamp Company. Peter participates, via video conference call, in a meeting with Scotland and Pierce investment banking employees and Bright Ideas’ CEO. Peter is advised that the company’s earnings projections for the next year have significantly dropped. Throughout the video conference call, several Scotland and Pierce salespeople and portfolio managers walk in and out of Peter’s office, where the call is taking place. As a result, they are aware of the drop in projected earnings for Bright Ideas. Before the call is concluded, firm personnel trade the stock of Bright Ideas Lamp Company on behalf of the firm’s clients and the firm’s proprietary account."
      comment: "Peter violated Standard II(A) because he failed to prevent the transfer and misuse of material nonpublic information to others in his firm. Peter’s firm should have adopted information barriers to prevent the communication of nonpublic information between departments of the firm. Firm personnel who are members or candidates and who traded on the information also violated Standard II(A) by trading on inside information."
    - title: "Example 3 (Selective Disclosure of Material Information)"
      text: "Levenson is an analyst based in Taipei who covers the Taiwanese market for her firm, which is based in Singapore. She is invited, together with the other 10 largest shareholders of a manufacturing company, to meet the finance director of that company. During the meeting, the finance director states that the company expects its workforce to strike next Friday, which will cripple productivity and distribution. Can Levenson use this information as a basis to change her rating on the company from “buy” to “sell”?"
      comment: "Levenson must first determine whether the material information is public. According to Standard II(A), if the company has not made this information public (a small group forum does not qualify as a method of public dissemination), she must not use the information."
    - title: "Example 4 (Determining Materiality)"
      text: "Fechtman is trying to decide whether to hold or sell shares of an oil-and-gas exploration company that she owns in several of the funds she manages. Although the company has underperformed the index for some time already, the trends in the industry sector signal that companies of this type might become takeover targets. While she is considering her decision, her doctor, who casually follows the markets, mentions that she thinks that the company in question will soon be bought out by a large multinational conglomerate and that it would be a good idea to buy the stock right now. After talking to various investment professionals and checking their opinions on the company, as well as checking industry trends, Fechtman decides the next day to accumulate more stock in the oil-and-gas exploration company."
      comment: "Although information on an expected takeover bid may be generally material and nonpublic, in this case, the source of information is unreliable, so the information cannot be considered material. Therefore, Fechtman is not prohibited from trading the stock based on this information."
    - title: "Example 5 (Applying the Mosaic Theory)"
      text: "Teja is a buy-side analyst covering the furniture industry. Looking for an attractive company to recommend to clients, he analyzes several furniture makers by studying their financial reports and visiting their operations. He also talks to some designers and retailers to find out which furniture styles are trendy and popular. Although none of the companies that he analyzes are clear buy recommendations, he discovers that one of them, Swan Furniture Company (SFC), may be in financial trouble. SFC’s extravagant new designs have been introduced at substantial cost. Even though these designs initially attracted attention, the public is now buying more conservative furniture from other makers. Based on this information and on a profit-and-loss analysis, Teja believes that SFC’s next-quarter earnings will drop substantially. He issues a sell recommendation for SFC. Immediately after receiving that recommendation, investment managers start reducing the SFC stock in their portfolios."
      comment: "While company information on quarterly earnings data is material and nonpublic, Teja based his conclusion about the earnings drop on public information and pieces of nonmaterial nonpublic information (such as opinions of designers and retailers). Therefore, trading based on Teja’s correct conclusion is not prohibited by Standard II(A)."
    - title: "Example 6 (Applying the Mosaic Theory)"
      text: "Clement is a senior financial analyst who specializes in the European automobile sector at Rivoli Capital. Because he has been repeatedly nominated by many leading industry magazines and newsletters as a “best analyst” for the automobile industry, he is widely regarded as an authority on the sector. After speaking with representatives of Turgot Chariots—a European auto manufacturer with sales primarily in the Asia-Pacific (APAC) region—and after conducting interviews with salespeople, labor leaders, his firm’s APAC currency analysts, and banking officials, Clement analyzed Turgot Chariots. He concluded that (1) its newly introduced model will probably not meet sales expectations, (2) its corporate restructuring strategy may face serious opposition from unions, (3) the depreciation of the South Korean won should lead to pressure on margins for the industry in general and Turgot’s market segment in particular, and (4) banks could take a tougher-than-expected stance in the upcoming round of credit renegotiations with the company. For these reasons, he changes his conclusion about the company from “market outperform” to “market underperform.” Clement retains the support material used to reach his conclusion in case questions later arise."
      comment: "To reach a conclusion about the value of the company, Clement pieced together a number of nonmaterial or public bits of information that affect Turgot Chariots. Therefore, under the mosaic theory, Clement did not violate Standard II(A) in drafting the report."
    - title: "Example 7 (Analyst Recommendations as Material Nonpublic Information)"
      text: "The next day, Clement prepares to be interviewed on a global financial news television program where he will discuss publicly for the first time his changed recommendation on Turgot Chariots. While preparing for the program, he mentions to the show’s producers and Zito, the journalist who will be interviewing him, the information he will discuss. Just prior to going on the air, Zito sells her holdings in Turgot Chariots. She also phones her father with the information because she knows that he and other family members have investments in Turgot Chariots."
      comment: "When Zito receives advance notice of Clement’s change of opinion, she knows it will have a material impact on the stock price, even if she is not aware of Clement’s underlying reasoning. She is not a client of Clement but obtains early access to the material nonpublic information prior to publication. Her trades are based on material nonpublic information; thus, she violated Standard II(A). Zito further violated the standard by relaying the information to her father. It would not matter if he or any other family member traded; the act of providing the information violated Standard II(A)."
    - title: "Example 8 (Acting on Nonpublic Information)"
      text: "Kellogg is a retired investment professional who manages his own portfolio. He owns shares in National Savings, a large local bank. A close friend, Mayfield, is a senior executive at National. National has seen its stock price drop considerably, and the news and outlook for the bank have not been positive in recent months. In a conversation about the economy and the banking industry, Mayfield relays the information that National will surprise the investment community in a few days when it announces excellent earnings for the quarter. Kellogg is pleasantly surprised by this information, and thinking that Mayfield, as a senior executive, knows the law and would not disclose inside information, he doubles his position in the bank. Subsequently, National announces that it had good operating earnings but had to set aside reserves for anticipated significant losses on its loan portfolio. The combined news causes the stock to go down 60%."
      comment: "Even though Kellogg believes that Mayfield would not break the law by disclosing inside information, Kellogg violated Standard II(A) by purchasing additional shares of National. The fact that he lost money on the purchase does not absolve Kellogg for trading on material nonpublic information. It is the member’s or candidate’s responsibility to make sure, before executing investment actions, that comments about earnings are not material nonpublic information."
    - title: "Example 9 (Materiality Determination)"
      text: "Nadler, a trader for a mutual fund, gets a text message from another firm’s trader, whom he has known for years. The message indicates that the trader believes a particular software company is going to report strong earnings when the firm publicly announces in two days. Nadler has a buy order from a portfolio manager within his firm to purchase several hundred thousand shares of the stock. Nadler is aggressive in placing the portfolio manager’s order and completes the purchases by the following morning, a day ahead of the firm’s planned earnings announcement."
      comment: "There are often rumors and whisper numbers before a release of any kind. The text message from the other trader would most likely be considered market noise. Unless Nadler knew that the trader had an ongoing business relationship with the public firm, he had no reason to suspect he was receiving material nonpublic information that would prevent him from completing the trading request of the portfolio manager."
    - title: "Example 10 (Using an Expert Network)"
      text: "McCoy is the senior drug analyst at a mutual fund. Her firm hires a service that connects her to experts in the treatment of cancer. Through various phone conversations, McCoy enhances her understanding of the latest therapies for successful treatment. This information is critical to McCoy for making informed recommendations of the companies producing these drugs."
      comment: "McCoy is appropriately using the expert networks to enhance her evaluation process. She neither asked for nor received information that may be considered material and nonpublic, such as preliminary trial results. McCoy is allowed to seek advice from professionals within the industry that she follows."
    - title: "Example 11 (Using an Expert Network)"
      text: "Watson is a research analyst working for a hedge fund. To stay informed, Watson relies on outside experts for information on such industries as technology and pharmaceuticals, where new advancements occur frequently. The meetings with the industry experts often are arranged through networks or placement agents that have specific policies and procedures in place to deter the exchange of material nonpublic information. <...> Watson arranges a call to discuss future prospects for one of the fund’s existing technology company holdings, a company that was testing a new semiconductor product. The scientist leading the tests indicates his disappointment with the performance of the new semiconductor. Following the call, Watson relays the insights he received to others at the fund. The fund sells its current position in the company and buys many put options because the market is anticipating the success of the new semiconductor and the share price reflects the market’s optimism."
      comment: "Watson violated Standard II(A) by passing along material nonpublic information concerning the ongoing product tests, which the fund used to trade in the securities and options of the related company. Watson cannot simply rely on the agreements signed by individuals who participate in expert networks that state that he has not received information that would prohibit his trading activity. He must make his own determination whether information he received through these arrangements reaches a materiality threshold that would influence his trading."
  - name: "II(B) Market Manipulation"
    tag: "2b"
    text: "Members and Candidates must not engage in practices that distort prices or artificially inflate trading volume with the intent to mislead market participants."
    examples:
    - title: "Example 1 (Independent Analysis and Company Promotion)"
      text: "The principal owner of Financial Information Services (FIS) entered into an agreement with two microcap companies to promote the companies’ stock in exchange for stock and cash compensation. The principal owner caused FIS to disseminate emails, design and maintain several websites, and distribute an online investment newsletter—all of which recommended investment in the two companies. The systematic publication of purportedly independent analyses and recommendations containing inaccurate and highly promotional and speculative statements increased public investment in the companies and led to dramatically higher stock prices."
      comment: "The principal owner of FIS violated Standard II(B) by using inaccurate reporting and misleading information under the guise of independent analysis to artificially increase the stock price of the companies."
    - title: "Example 2 (Personal Trading Practices and Price)"
      text: "Gray is a private investor in Belgium who bought a large position several years ago in Fame Pharmaceuticals, a German small-cap security with limited average trading volume. He has decided to significantly reduce his holdings owing to the poor performance of the company. Gray is worried that the low trading volume for the stock may cause the price to decline further as he attempts to sell his large position. <...> Gray divides his holdings into multiple accounts in different brokerage firms and private banks in the names of family members, friends, and even a private religious institution. He then creates a rumor campaign on various blogs and social media outlets promoting the company. <...> Gray begins to buy and sell the stock using the accounts in hopes of raising the trading volume and the price. He conducts the trades through multiple brokers, selling slightly larger positions than he bought on a tactical schedule, and over time, he is able to reduce his holding as desired without negatively affecting the sale price."
      comment: "Gray violated Standard II(B) by fraudulently creating the appearance that there was greater investor interest in the stock through the online rumors. Additionally, through his trading strategy, he created the appearance that there was greater liquidity in the stock than actually existed. He manipulated the price through both misinformation and trading practices."
    - title: "Example 3 (Creating Artificial Price Volatility)"
      text: "Murphy is an analyst at Divisadero Securities & Co., which has a significant number of hedge funds among its most important brokerage clients. Some of the hedge funds hold short positions on Wirewolf Semiconductor. Two trading days before the publication of a quarter-end report, Murphy alerts his sales force that he is about to issue a research report on Wirewolf that will include the following opinions: \n• Quarterly revenues are likely to fall short of management’s guidance. \n• Earnings will be as much as 5 cents per share (or more than 10%) below consensus. \n• Wirewolf’s highly respected chief financial officer may be about to join another company. <...> Knowing that Wirewolf has already entered its declared quarter-end “quiet period” before reporting earnings (and thus would be reluctant to respond to rumors), Murphy times the release of his research report specifically to sensationalize the negative aspects of the message in order to create significant downward pressure on Wirewolf’s stock—to the distinct advantage of Divisadero’s hedge fund clients. The report’s conclusions are based on speculation, not on fact. The next day, the research report is broadcast to all of Divisadero’s clients and to the usual newswire services. <...> Before Wirewolf’s investor relations department can assess the damage on the final trading day of the quarter and refute Murphy’s report, its stock opens trading sharply lower, allowing Divisadero’s clients to cover their short positions at substantial gains."
      comment: "Murphy violated Standard II(B) by aiming to create artificial price volatility designed to have a material impact on the price of an issuer’s stock."
    - title: "Example 4 (Personal Trading and Volume)"
      text: "Sekar manages two funds—an equity fund and a balanced fund—whose equity components are supposed to be managed in accordance with the same model. According to that model, the funds’ holdings in stock of Digital Design Inc. (DD) are excessive. Reduction of the DD holdings would not be easy, however, because the stock has low liquidity. Sekar decides to start trading larger portions of DD stock back and forth between his two funds to slowly increase the price; he believes market participants will see growing volume and increasing price and become interested in the stock. If other investors are willing to buy the DD stock because of such interest, then Sekar will be able to get rid of at least some of his overweight position without inducing price decreases. In this way, the whole transaction will be for the benefit of fund participants, even if additional brokers’ commissions are incurred."
      comment: "Sekar’s plan would be beneficial for his funds’ participants but is based on artificial distortion of both trading volume and the price of the DD stock and thus constitutes a violation of Standard II(B)."
    - title: "Example 5 (Creating Artificial Price Volatility)"
      text: "Gordon, an analyst of household products companies, is employed by a research boutique, Picador & Co. Based on information that she has gathered during a trip through Latin America, she believes that Hygene, Inc., a major marketer of personal care products, has generated better-than-expected sales from its new product initiatives in South America. After modestly boosting her projections for revenue and for gross profit margin in her worksheet models for Hygene, Gordon estimates that her earnings projection of US$2.00 per diluted share for the current year may be as much as 5% too low. She contacts the chief financial officer (CFO) of Hygene to try to gain confirmation of her findings from her trip and to get feedback regarding her revised models. The CFO declines to comment and reiterates management’s most recent guidance of US$1.95–US$2.05 for the year. <...> Gordon decides to try to force a comment from the company by telling Picador & Co. clients who follow a momentum investment style that consensus earnings projections for Hygene are much too low; she explains that she is considering raising her published estimate by an ambitious US$0.15–US$2.15 per share. She believes that when word of an unrealistically high earnings projection filters back to Hygene’s investor relations department, the company will feel compelled to update its earnings guidance. Meanwhile, Gordon hopes that she is correct at least with respect to the earnings direction and that she will help clients who act on her insights to profit from a quick gain by trading on her advice."
      comment: "By exaggerating her earnings projections in order to try to fuel a quick gain in Hygene’s stock price, Gordon is in violation of Standard II(B). However, it would have been acceptable for Gordon to write a report that \n• framed her earnings projection in a range of possible outcomes and \n• outlined clearly the assumptions used in her Hygene models that took into consideration the findings from her trip through Latin America."
    - title: "Example 6 (Pump and Dump Strategy)"
      text: "In an effort to pump up the price of his holdings in Moosehead & Belfast Railroad Company, Weinberg logs on to several investor chatrooms to start rumors that the company is about to expand its rail network in anticipation of receiving a large contract for shipping lumber."
      comment: "Weinberg violated Standard II(B) by disseminating false information about Moosehead & Belfast with the intent to mislead market participants."
  - name: "III(A) Loyalty, Prudence, and Care"
    tag: "3a"
    text: "Members and Candidates have a duty of loyalty to their clients and must act with reasonable care and exercise prudent judgment. Members and Candidates must act for the benefit of their clients and place their clients’ interests before their employer’s or their own interests."
    examples:
    - title: "Example 1 (Identifying the Client—Plan Participants)"
      text: "First Country Bank serves as trustee for the Miller Company’s pension plan. Miller is the target of a hostile takeover attempt by Newton, Inc. In attempting to ward off Newton, Miller’s managers persuade Wiley, an investment manager at First Country Bank, to purchase a significant amount of Miller common stock in the open market for the employee pension plan. Miller’s officials indicate that such an action would be favorably received and would probably result in other accounts being placed with the bank. Although Wiley believes the stock is overvalued and would not ordinarily buy it, he purchases the stock to support Miller’s managers, to maintain Miller’s good favor toward the bank, and to realize additional new business. The heavy stock purchases cause Miller’s market price to rise to such a level that Newton retracts its takeover bid."
      comment: "Standard III(A) requires that a member or candidate, in evaluating a takeover bid, act prudently and solely in the interests of plan participants and beneficiaries. To meet this requirement, a member or candidate must carefully evaluate the long-term prospects of the company against the short-term prospects presented by the takeover offer and by the ability to invest elsewhere. In this instance, Wiley, acting on behalf of his employer, which was the trustee for a pension plan, clearly violated Standard III(A). He used the pension plan to perpetuate existing management, perhaps to the detriment of plan participants and the company’s shareholders, and to benefit himself. Wiley’s responsibilities to the plan participants and beneficiaries must take precedence over any ties of his bank to corporate managers and over his self-interest. Wiley had a duty to examine the takeover offer on its own merits and to make an independent decision. The guiding principle is the appropriateness of the investment decision to the pension plan, not whether the decision benefited Wiley or the company that hired him."
    - title: "Example 2 (Client Commission Practices)"
      text: "Jackson is CEO of JNI, a successful investment counseling firm that serves as investment manager for the pension plans of several large regional companies. JNI’s trading activities generate a significant amount of commission-related business. Jackson uses the brokerage and research services of many firms, but most of his company’s trading activity is handled through one large brokerage company, Thompson, Inc., because the executives of the two firms have a close friendship. Thompson’s commission structure is high in comparison with charges for similar brokerage services from other firms. Jackson considers Thompson’s research services and execution capabilities average. In exchange for JNI directing its brokerage to Thompson, Thompson absorbs a number of JNI overhead expenses, including those for rent."
      comment: "Jackson is breaching his responsibilities by using client brokerage for services that do not benefit JNI clients and by not obtaining best price and best execution for JNI clients. Because Jackson is not upholding his duty of loyalty, he is violating Standard III(A)."
    - title: "Example 3 (Brokerage Arrangements)"
      text: "Everett, a struggling independent investment adviser, serves as investment manager for the pension plans of several companies. One of her brokers, Scott Company, is close to finalizing management agreements with prospective new clients whereby Everett would manage the new client accounts and trade the accounts exclusively through Scott. One of Everett’s existing clients, Crayton Corporation, has directed Everett to place security transactions for Crayton’s account exclusively through Scott. To induce Scott to exert effort to send more new accounts to her, Everett also directs transactions to Scott from other clients without their knowledge."
      comment: "Everett has an obligation at all times to seek best price and best execution on all trades. Everett may direct new client trades exclusively through Scott Company as long as Everett receives best price and execution on the trades or receives a written statement from new clients that she is not to seek best price and execution and that they are aware of the consequence for their accounts. Everett may trade other accounts through Scott as a reward for directing clients to Everett only if the accounts receive best price and execution and the practice is disclosed to the accounts. Because Everett does not disclose the directed trading, Everett violated Standard III(A)."
    - title: "Example 4 (Brokerage Arrangements)"
      text: "Rome is a trust officer for Paget Trust Company. Rome’s supervisor is responsible for reviewing Rome’s trust account transactions and her monthly reports of personal stock transactions. Rome has been using Gray, a broker, almost exclusively for trust account brokerage transactions. When Gray makes a market in stocks, he has been giving Rome a lower price for personal purchases and a higher price for sales than he gives to Rome’s trust accounts and other investors."
      comment: "Rome is violating her duty of loyalty to the bank’s trust accounts by using Gray for brokerage transactions simply because Gray trades Rome’s personal account on favorable terms. Rome is placing her own interests before those of her clients."
    - title: "Example 5 (Client Commission Practices)"
      text: "Parker, an analyst with Provo Advisors, covers South American equities for her firm. She likes to travel to the markets for which she is responsible and decides to go on a trip to Chile, Argentina, and Brazil. The trip is sponsored by SouthAM, Inc., a research firm with a small broker/dealer affiliate that uses the clearing facilities of a larger New York brokerage house. SouthAM specializes in arranging South American briefing trips for analysts, during which they can meet with central bank officials, government ministers, local economists, and senior executives of corporations. SouthAM accepts commission dollars at a ratio of 2 to 1 against the hard dollar costs of the research fee for the trip. Parker is not sure that SouthAM’s execution is competitive, but without informing her supervisor, she directs the trading desk at Provo to start giving commission business to SouthAM so she can take the trip. SouthAM has conveniently timed the briefing trip to coincide with the beginning of Carnival season, so Parker also decides to spend five days of vacation in Rio de Janeiro at the end of the trip. Parker uses commission dollars to pay for the five days of hotel expenses."
      comment: "Parker is violating Standard III(A) by not exercising her duty of loyalty to her clients. She must determine whether the commissions charged by SouthAM are reasonable in relation to the benefit of the research provided by the trip. She also must determine whether best execution and prices could be received from SouthAM. In addition, the five extra days are not part of the research effort, because they do not assist in the investment decision making. Thus, the hotel expenses for the five days must not be paid for with client commission dollars."
    - title: "Example 6 (Excessive Trading)"
      text: "Knauss manages the portfolios of a number of high-net-worth individuals. A major part of her investment management fee is based on trading commissions. Knauss engages in extensive trading for each of her clients to ensure that she attains the minimum commission level set by her firm. Although the securities purchased and sold for the clients are appropriate and fall within the acceptable asset classes for the clients, the amount of trading for each account exceeds what is necessary to accomplish the client’s investment objectives."
      comment: "Knauss violated Standard III(A) because she is using the assets of her clients to benefit her firm and herself"
    - title: "Example 7 (Managing Family Accounts)"
      text: "Dill recently joined New Investments Asset Managers. To assist Dill in building a book of clients, both his father and brother opened new fee-paying accounts. Dill followed all the firm’s procedures in noting his relationships with these clients and in developing their investment policy statements. After several years, the number of Dill’s clients has grown, but he still manages the original accounts of his family members. An IPO is coming to market that is a suitable investment for many of his clients, including his brother. Dill does not receive the amount of stock he requested, so to avoid any appearance of a conflict of interest, he does not allocate any shares to his brother’s account."
      comment: "Dill violated Standard III(A) because he did not act for the benefit of his brother’s account or his other accounts. The brother’s account is a regular fee-paying account comparable to the accounts of his other clients. By not allocating the shares proportionately across all accounts for which he thought the IPO was suitable, Dill disadvantaged specific clients. Dill would have been correct in not allocating shares to his brother’s account if that account was being managed outside the normal fee structure of the firm."
    - title: "Example 8 (Identifying the Client)"
      text: "Hensley has been hired by a law firm to testify as an expert witness. Although the testimony is intended to represent impartial advice, she is concerned that her work may have negative consequences for the law firm. If the law firm is Hensley’s client, how does she ensure that her testimony will not violate the required duty of loyalty, prudence, and care to one’s client?"
      comment: "In this situation, the law firm represents Hensley’s employer and the aspect of “who is the client” is not well defined. When acting as an expert witness, Hensley is bound by the standard of independence and objectivity in the same manner that an independent research analyst would be bound. Hensley must not let the law firm influence the testimony she provides in the legal proceedings."
    - title: "Example 9 (Identifying the Client)"
      text: "Miller is a mutual fund portfolio manager. The fund is focused on the global financial services sector. Spears is a private wealth manager in the same city as Miller and is a friend of Miller. At a CFA Institute local society meeting, Spears mentions to Miller that her new client is an investor in Miller’s fund. She states that the two of them now share a responsibility to this client"
      comment: "Spears’ statement is not entirely accurate. Because she provides the advisory services to her new client, she alone is bound by the duty of loyalty to this client. Miller’s responsibility is to manage the fund according to the investment policy statement of the fund. His actions must not be influenced by the needs of any particular fund investor."
    - title: "Example 10 (Client Loyalty)"
      text: "After providing client account investment performance to external-facing departments but prior to it being finalized for release to clients, Nguyen, an investment performance analyst, notices the reporting system missed a trade. Correcting the omission resulted in a large loss for a client that had previously placed the firm on “watch” for potential termination owing to underperformance in prior periods. Nguyen knows this news is unpleasant but informs the appropriate individuals that the report needs to be updated before releasing it to the client."
      comment: "Nguyen’s actions align with the requirements of Standard III(A). Even though the correction may lead to the firm’s termination by the client, withholding information on errors is not in the best interest of the client."
    - title: "Example 11 (Execution-Only Responsibilities)"
      text: "Sulejman recently became a candidate in the CFA Program. He is a broker who executes client-directed trades for several high-net-worth individuals. Sulejman does not provide any investment advice and only executes the trading decisions made by clients. He is concerned that the Code and Standards impose a fiduciary duty on him in his dealing with clients and sends an email to the CFA Institute Ethics Helpdesk (ethics@cfainstitute.org) to seek guidance on this issue."
      comment: "In this instance, Sulejman serves in an execution-only capacity. His duty of loyalty, prudence, and care is centered on the skill and diligence used when executing trades—namely, by seeking best execution and making trades within the parameters set by the clients (instructions on quantity, price, timing, etc.). Acting in the best interests of the client dictates that trades are executed on the most favorable terms that can be achieved for the client. Given this job function, the requirements of the Code and Standards for loyalty, prudence, and care clearly do not impose a fiduciary duty."
  - name: "III(B) Fair Dealing"
    tag: "3b"
    text: "Members and Candidates must deal fairly and objectively with all clients when providing investment analysis, making investment recommendations, taking investment action, or engaging in other professional activities."
    examples:
    - title: "Example 1 (Selective Disclosure)"
      text: "Ames, a well-known and respected analyst, follows the computer industry. In the course of his research, he finds that a small, relatively unknown company whose shares are traded over the counter has just signed significant contracts with some of the companies he follows. After a considerable amount of investigation, Ames decides to write a research report on the small company and recommend purchase of its shares. While the report is being reviewed by the company for factual accuracy, Ames schedules a luncheon with several of his best clients to discuss the company. At the luncheon, he mentions the purchase recommendation scheduled to be sent early the following week to all the firm’s clients."
      comment: "Ames violated Standard III(B) by disseminating the purchase recommendation to the clients with whom he had lunch a week before the recommendation is sent to all clients."
    - title: "Example 2 (Fair Dealing between Funds)"
      text: "Rivers, president of XYZ Corporation, moves his company’s growth-oriented pension fund to a particular bank primarily because of the excellent investment performance achieved by the bank’s commingled fund for the prior five-year period. Later, Rivers compares the results of his pension fund with those of the bank’s commingled fund. He is startled to learn that, even though the two accounts have the same investment objectives and similar portfolios, his company’s pension fund has significantly underperformed the bank’s commingled fund. Questioning this result at his next meeting with Jackson, the pension fund’s manager, Rivers is told that, as a matter of policy, when a new security is placed on the recommended list, Jackson first purchases the security for the commingled account and then purchases it on a pro rata basis for all other pension fund accounts. Similarly, when a sale is recommended, the security is sold first from the commingled account and then sold on a pro rata basis from all other accounts. Rivers also learns that if the bank cannot get enough shares (especially of hot issues) to be meaningful to all the accounts, its policy is to place the new issues only in the commingled account. <...> Seeing that Rivers is neither satisfied nor pleased by the explanation, Jackson quickly adds that nondiscretionary pension accounts and personal trust accounts have an even lower priority on purchase and sale recommendations than discretionary pension fund accounts. Furthermore, Jackson states that the company’s pension fund had the opportunity to invest up to 5% in the commingled fund."
      comment: "The bank’s policy does not treat all customers fairly, and Jackson violated her duty to her clients by giving priority to the growth-oriented commingled fund over all other funds and to discretionary accounts over nondiscretionary accounts. Jackson must execute orders on a systematic basis to be fair to all clients."
    - title: "Example 3 (Fair Dealing and IPO Distribution)"
      text: "Morris works for a small regional securities firm. His work consists of corporate finance activities and investing for institutional clients. PickleDilly, Ltd., is planning to go public. The partners have secured rights to buy a professional pickleball franchise and plan to use the funds from the issue to complete the purchase. Because pickleball is the current rage, Morris believes he has a hot issue on his hands. He has quietly negotiated some options for himself for helping convince PickleDilly to do the financing through his securities firm. When he seeks expressions of interest, institutional buyers oversubscribe the issue. Morris, assuming that the institutions have the financial clout to drive the stock up, fills all orders (including his own) but decreases the institutional blocks."
      comment: "Morris violated Standard III(B) by not treating all customers fairly. To meet his obligations under the standard, Morris needed to refrain from taking any shares himself and needed to prorate the distribution of the shares to clients or use some other distribution method for treating clients fairly. In addition, he should have avoided the conflict of interest caused by the options by not seeking those additional benefits. Because Morris did not avoid the conflict, he must disclose to his firm and to his clients that he received options as part of the deal [see Standard VI(A) Disclosure of Conflicts]."
    - title: "Example 4 (Fair Dealing and Transaction Allocation)"
      text: "Preston, the chief investment officer of Porter Williams Investments (PWI), a medium-size money management firm, has been trying to retain a client, Colby Company. Management at Colby, which accounts for almost half of PWI’s revenues, recently told Preston that if the performance of its account did not improve, it would find a new money manager. Shortly after this threat, Preston purchases mortgage-backed securities (MBSs) for several accounts, including Colby’s. Preston is busy with a number of transactions that day, so she fails to allocate the trades immediately or write up the trade tickets. A few days later, when Preston is allocating trades, she notes that some of the MBSs have significantly increased in price and some have dropped. Preston decides to allocate the profitable trades to Colby and spread the losing trades among several other PWI accounts."
      comment: "Preston violated Standard III(B) by failing to deal fairly with her clients in taking these investment actions. Preston should have allocated the trades prior to executing the orders, or she should have had a systematic approach to allocating the trades, such as pro rata, as soon as it was practical after they were executed."
    - title: "Example 5 (Selective Disclosure)"
      text: "Saunders Industrial Waste Management (SIWM) publicly indicates to analysts that it is comfortable with the somewhat disappointing earnings-per-share projection of US$1.16 for the quarter. Roberts, an analyst at Coffey Investments, is confident that SIWM management understated the forecasted earnings so that the real announcement would cause an “upside surprise” and boost the price of SIWM stock. The “whisper number” (rumored) estimate based on extensive research and discussed among knowledgeable analysts is higher than US$1.16. Roberts repeats the US$1.16 figure in his research report to all Coffey clients but informally tells his large clients that he expects the earnings per share to be higher, making SIWM a good buy."
      comment: "By not sharing his opinion regarding the potential for a significant upside earnings surprise with all clients, Roberts did not treat all clients fairly and violated Standard III(B)."
    - title: "Example 6 (Additional Services for Select Clients)"
      text: "Weng uses email to issue a new recommendation to all his clients. He then calls his three largest institutional clients to discuss the recommendation in detail, and they compensate him for the personal outreach."
      comment: "Weng did not violate Standard III(B). He widely disseminated the recommendation and information to all his clients prior to discussing it with a select few. Weng’s largest clients received additional personal service because they pay higher fees. If Weng had discussed the report with a select group of clients prior to distributing it to all his clients, he would have violated Standard III(B)."
    - title: "Example 7 (Minimum Lot Allocations)"
      text: "Hampton is a well-respected private wealth manager in her community with a diversified client base. She determines that a new 10-year bond being offered by Healthy Pharmaceuticals is appropriate for five of her clients. Three clients request to purchase US$10,000 each, and the other two request US$50,000 each. The minimum lot size is established at US$5,000, and the issue is oversubscribed at the time of placement. Her firm’s policy is that odd-lot allocations, especially those below the minimum, should be avoided because they may affect the liquidity of the security at the time of sale. <...> Hampton is informed she will receive only US$55,000 of the offering for all accounts. Hampton distributes the bond investments as follows: The three accounts that requested US$10,000 are allocated US$5,000 each, and the two accounts that requested US$50,000 are allocated US$20,000 each."
      comment: "Hampton did not violate Standard III(B), even though the distribution is not on a completely pro-rata basis, because of the required minimum lot size. With the total allocation being significantly below the amount requested, Hampton ensured that each client received at least the minimum lot size of the issue and that the filled allocations were close in percentage to the requested allocations. This approach allowed the clients to efficiently sell the bond later, if necessary."
    - title: "Example 8 (Excessive Trading)"
      text: "Chan manages the accounts for many pension plans, including the plan of his father’s employer. Chan developed similar but not identical investment policies for each client, so the investment portfolios are rarely the same. To minimize the cost to his father’s pension plan, he intentionally trades more frequently in the accounts of other clients to ensure the required brokerage commissions are incurred to continue receiving free research that benefits all the pension plans."
      comment: "Chan is violating Standard III(B) because his trading actions are disadvantaging his clients to enhance a relationship with a preferred client. All clients are benefiting from the research being provided and should incur their fair portion of the costs. This does not mean that additional trading should occur if a client has not paid an equal portion of the commission; trading should occur only as required by the strategy."
    - title: "Example 9 (Limited Social Media Disclosures)"
      text: "Burdette was recently hired by Fundamental Investment Management (FIM) as a junior auto industry analyst. Burdette is expected to expand the social media presence of the firm, including on Facebook, LinkedIn, and X (formerly known as Twitter). Burdette’s supervisor, Graf, encourages Burdette to explore opportunities to increase FIM’s online presence and ability to share content, communicate, and broadcast information to clients. <...> As part of her auto industry research for FIM, Burdette is completing a report on the financial impact of Sun Drive Auto Ltd.’s new solar technology for compact automobiles. This research report will be her first for FIM, and she believes Sun Drive’s technology could revolutionize the auto industry. In her excitement, Burdette posts a brief message to FIM LinkedIn followers summarizing her “buy” recommendation for Sun Drive Auto stock."
      comment: "Burdette violated Standard III(B) by sending an investment recommendation to a select group of contacts prior to distributing it to all clients."
    - title: "Example 10 (Performance Analysis)"
      text: "Rove, a performance analyst for Alpha-Beta Investment Management, is describing to the firm’s chief investment officer (CIO) two new reports he would like to develop to assist the firm in meeting its obligations to treat clients fairly. Because many of the firm’s clients have similar investment objectives and portfolios, Rove suggests a report detailing securities owned across several client accounts and the percentage of the portfolio each security represents. The second report would compare the monthly performance of portfolios with similar strategies. The outliers in each report would be submitted to the CIO for review."
      comment: "As a performance analyst, Rove likely has little direct contact with clients and thus has limited opportunity to treat clients differently. The recommended reports comply with Standard III(B) while helping the firm conduct after-the-fact reviews of how effectively the firm’s advisers are dealing with their clients’ portfolios. Reports that monitor the fair treatment of clients are an important oversight tool to ensure that clients are treated fairly."
  - name: "III(C) Suitability"
    tag: "3c"
    text: "1. When Members and Candidates are in an advisory relationship with a client, they must:\n    a. Make a reasonable inquiry into a client’s or prospective client’s investment experience, risk and return objectives, and financial constraints prior to making any investment recommendation or taking investment action and must reassess and update this information regularly. \n    b. Determine that an investment is suitable to the client’s financial situation and consistent with the client’s written objectives, mandates, and constraints before making an investment recommendation or taking investment action. \n    c. Judge the suitability of investments in the context of the client’s total portfolio. \n2. When Members and Candidates are responsible for managing a portfolio to a specific mandate, strategy, or style, they must make only investment recommendations or take only investment actions that are consistent with the stated objectives and constraints of the portfolio."
    examples:
    - title: "Example 1 (Investment Suitability—Risk Profile)"
      text: "Smith, an investment adviser, has two clients: Robertson, who is 60 years old, and Lanai, who is 40 years old. Both clients earn roughly the same salary, but Robertson has a much higher risk tolerance because he has a large asset base and low income needs. Robertson is willing to invest part of his assets very aggressively; Lanai wants only to achieve a steady rate of return with low volatility to pay for his children’s education. Smith recommends investing 20% of both portfolios in zero-yield, small-cap, high-technology equity issues."
      comment: "In Robertson’s case, the investment may be appropriate because of his financial circumstances and aggressive investment position, but this investment is not suitable for Lanai. Smith violated Standard III(C) by applying Robertson’s investment strategy to Lanai because the two clients’ financial circumstances and objectives differ."
    - title: "Example 2 (Investment Suitability—Entire Portfolio)"
      text: "McDowell, an investment adviser, suggests to Crosby, a risk-averse client, that covered call options be used in his equity portfolio. The purpose would be to enhance Crosby’s income and partially offset any untimely depreciation in the portfolio’s value should the stock market or other circumstances affect his holdings unfavorably. McDowell educates Crosby about all possible outcomes, including the risk of incurring an added tax liability if a stock rises in price and is called away and, conversely, the risk of his holdings losing protection on the downside if prices drop sharply."
      comment: "When determining suitability of an investment, the primary focus should be the characteristics of the client’s entire portfolio, not the characteristics of single securities on an issue-by-issue basis. The basic characteristics of the entire portfolio will largely determine whether investment recommendations are taking client factors into account. In this case, McDowell properly considers the investment in the context of the entire portfolio and thoroughly explains the investment to the client."
    - title: "Example 3 (IPS Updating)"
      text: "Evans, a portfolio manager at Blue Chip Investment Advisers, learns that some significant changes have recently taken place in Jones’s life. A wealthy relative left Jones an inheritance that increased his net worth fourfold, to US$1 million."
      comment: "The inheritance may have significantly increased Jones’s ability (and possibly his willingness) to assume risk and perhaps has diminished the average yield required to meet his current income needs. Jones’s financial circumstances have changed considerably, so Evans must review and potentially update Jones’s IPS to reflect how his investment objectives have changed."
    - title: "Example 4 (Following an Investment Mandate)
      text: "Perkowski manages a high-income mutual fund. He purchases zero-dividend stock in a financial services company because he believes the stock is undervalued and is in a potential growth industry, which makes it an attractive investment."
      comment: "A zero-dividend stock does not seem to fit the mandate of the fund that Perkowski manages. Unless Perkowski’s investment fits within the mandate or is in the realm of allowable investments the fund has made clear in its disclosures, Perkowski violated Standard III(C)."
    - title: "Example 5 (IPS Requirements and Limitations)"
      text: "Gubler, chief investment officer of a property/casualty insurance subsidiary of a large financial conglomerate, wants to improve the diversification of the subsidiary’s investment portfolio and increase its returns. The subsidiary’s IPS provides for liquid investments, such as large-cap equities and government, supranational, and corporate bonds with a minimum credit rating of AA and maturity of no more than five years. In a recent presentation, a venture capital group offered very attractive prospective returns on some of its private equity funds that provide seed capital to ventures. Investors would have to observe a minimum three-year lockup period and a subsequent laddered exit option for a maximum of one-third of their shares per year. Gubler does not want to miss this opportunity. In an effort to optimize the return on the equity assets in the subsidiary’s current portfolio and after extensive analysis, he invests 4% in this seed fund, leaving the portfolio’s total equity exposure still well below its upper limit."
      comment: "Gubler violated Standard III(C). His new investment locks up part of the subsidiary’s assets for at least three years and up to as many as five years or more. The IPS requires investments in highly liquid investments and describes accepted asset classes; private equity investments with a lockup period would not fall within the mandate. Even without a lockup period, an asset class with only an occasional and thus implicitly illiquid market may not be suitable for the portfolio."
    - title: "Example 6 (Investment Suitability—Risk Profile)"
      text: "Snead, a portfolio manager for Thomas Investment Counsel, Inc., specializes in managing public retirement funds and defined benefit pension plan accounts, all of which have long-term investment objectives. A year ago, Snead’s employer, in an attempt to motivate and retain key investment professionals, introduced a bonus compensation system that rewards portfolio managers on the basis of quarterly performance relative to their peers and to certain benchmark indexes. In an attempt to improve the short-term performance of her accounts, Snead changes her investment strategy for the retirement funds she manages and purchases several high-beta stocks for client portfolios. These purchases are seemingly contrary to the clients’ IPSs. Following their purchase, an officer of Griffin Corporation, one of Snead’s pension fund clients, asks why Griffin Corporation’s portfolio seems to be dominated by high-beta stocks of companies that often appear among the most actively traded issues. No change in objective or strategy has been recommended by Snead during the year."
      comment: "Snead violated Standard III(C) by investing the clients’ assets in high-beta stocks. These high-risk investments are contrary to the long-term risk profile established in the clients’ IPSs. Snead has changed the investment strategy of the clients in an attempt to reap short-term rewards offered by her firm’s new compensation arrangement, not in response to changes in clients’ IPSs."
    - title: "Example 7 (Constraints)"
      text: "DeVries is trustee of the MPG pension fund. Recently, the fund conducted a survey on the preferences of the beneficiaries. The survey asked several questions about the return impact and risks associated with the incorporation of ESG issues into the investment selection process. The results of the survey showed that the beneficiaries like high pension payouts, but the investment returns should be achieved while considering ESG issues. <...> DeVries introduces an amendment to the IPS to incorporate an ESG framework into the investment decision-making process. Among the specific factors in the ESG framework is a restriction on investing in producers of products that negatively affect the health of consumers. The changes to the IPS are approved by the MPG pension board and communicated to all external managers. <...> After receiving communications on the update to the IPS, Van Cleef, an external manager for the MPG pension fund, purchases stock in a tobacco firm. He reasons that tobacco, although not healthy, exhibits an attractive risk–return profile and will contribute to the high pension payouts that the beneficiaries so desire. Van Cleef believes that investment return is his first priority as a manager."
      comment: "Van Cleef violated Standard III(C) because he failed to consider the constraints and unique circumstances of the beneficiaries of the pension fund. In this case, a preference for incorporating ESG issues into the investment process is clearly mandated. <...> The trustees have a duty to ensure that the fund’s assets are invested in accordance with the IPS. Any trustee who is required to abide by the Code and Standards, such as DeVries, would need to ensure that Van Cleef sells the inappropriate tobacco securities."
    - title: "Example 8 (Suitability Factors)"
      text: "Kim is the portfolio manager of a family office. The family office’s IPS objectives include long-term capital preservation and mitigation of downside risk. Kim is considering two investments in the chemical industry: Park Inc. and Dong Inc. Solely on the basis of financial statement analysis, the Park Inc. investment is the most attractive. Upon further analysis, Kim finds that Dong Inc. scores much higher than Park Inc. on other factors, including ESG criteria. <...> Kim believes that companies scoring high on ESG factors typically have higher-quality management and reduced environmental risks, such as risks that might lead to costly accidents or regulatory fines. Such factors ultimately benefit the expected return and risk profile of the investment. On that basis, Kim invests in Dong Inc. for the family office."
      comment: "Kim has a responsibility to select investments that are suitable for the IPS objectives. He is permitted to incorporate criteria beyond financial metrics, including but not limited to ESG issues, into the investment decision-making process. Kim’s actions are not in conflict with his obligation to make effective suitability determinations."
  - name: "III(D) Performance Presentation"
    tag: "3d"
    text: "When communicating investment performance information, Members and Candidates must make reasonable efforts to ensure that it is fair, accurate, and complete."
    examples:
    - title: "Example 1 (Performance Calculation and Length of Time)"
      text: "Taylor of Taylor Trust Company distributes a brochure to potential clients stating that the firm consistently achieves “25% annual growth” of assets. Taylor Trust’s common trust fund did increase 25% for the previous year, which mirrored the increase of the overall market. The fund never had an annual growth rate of 25% prior to last year, and the average rate of growth of all of Taylor Trust accounts for five years is 5% per year."
      comment: "Taylor’s brochure is in violation of Standard III(D). Taylor must disclose that the 25% growth occurred only in one year and only for the firm’s common trust fund. A general claim of firm performance must take into account the performance of all categories of accounts. By stating that clients can expect a steady 25% annual compound growth rate, Taylor is misrepresenting one portfolio’s single-year actual performance as expected performance."
    - title: "Example 2 (Performance Calculation and Asset Weighting)"
      text: "Judd, a senior partner at Alexander Capital Management, circulates a performance report for the capital appreciation accounts for the years 2008 through 2022. The firm claims compliance with the GIPS standards. Returns are not calculated in accordance with the requirements of the GIPS standards, however, because the composite returns are not calculated by asset weighting portfolio returns."
      comment: "Judd violated Standard III(D). When claiming compliance with the GIPS standards, firms must meet all the requirements, make mandatory disclosures, and meet any other requirements that apply to that firm’s specific situation. The GIPS standards require firms to asset weight portfolio returns to calculate composite returns. Judd’s violation is not from any misuse of the data but from publishing a performance report with her firm’s false claim of GIPS compliance."
    - title: "Example 3 (Performance Presentation and Prior Fund/Employer)"
      text: "McCoy is vice president and managing partner of the equity investment group of Mastermind Financial Advisers, a new business. Mastermind recruited McCoy because he had a proven six-year track record with G&P Financial. In developing Mastermind’s advertising and marketing campaign, McCoy prepares an advertisement that includes the equity investment performance he achieved at G&P Financial. The advertisement for Mastermind does not identify the equity performance as being earned while at G&P. The advertisement is distributed to existing clients and prospective clients of Mastermind."
      comment: "McCoy violated Standard III(D) by distributing an advertisement that contains material misrepresentations about the historical performance of Mastermind. Standard III(D) requires that members and candidates make reasonable efforts to ensure that performance information is a fair, accurate, and complete representation of an individual’s or firm’s performance. As a general matter, this standard does not prohibit showing past performance of accounts managed at a prior firm as part of a performance track record as long as showing that record is accompanied by appropriate disclosures about where the performance took place and the person’s specific role in achieving that performance. If McCoy chooses to use his past performance from G&P in Mastermind’s advertising, he must make full disclosure of the source of the historical performance."
    - title: "Example 4 (Performance Presentation and Simulated Results)"
      text: "Davis developed a mutual fund selection product based on historical information from 2000 to 2015. Davis tests his methodology by applying it retroactively to data from the 2016–22 period, thus producing simulated performance results for those years. In January 2023, Davis’s employer decides to offer the product and Davis begins promoting it through trade journal advertisements and direct dissemination to clients. The advertisements include the performance results for the 2016–22 period but do not indicate that the results were simulated."
      comment: "Davis violated Standard III(D) by failing to clearly identify simulated performance results. Standard III(D) prohibits members and candidates from making any statements that misrepresent the performance achieved by them or their firms and requires members and candidates to make every reasonable effort to ensure that performance information presented to clients is fair, accurate, and complete. Davis’s use of simulated results must be accompanied by full disclosure as to the source of the performance data, including the fact that the results from 2016 through 2022 are the result of applying the model retroactively to that time period."
    - title: "Example 5 (Performance Calculation and Selected Accounts Only)"
      text: "In a presentation prepared for prospective clients, Kilmer shows the rates of return realized over a five-year period by a “composite” of his firm’s discretionary accounts that have a “balanced” objective. This composite, however, consists of only a few of the accounts that met the balanced criterion set by the firm, excludes accounts under a certain asset level without disclosing the fact of their exclusion, and includes accounts that do not have the balanced mandate, because those accounts help increase the investment results. In addition, to achieve better results, Kilmer manipulates the narrow range of accounts included in the composite by changing the accounts that make up the composite over time."
      comment: "Kilmer violated Standard III(D) by misrepresenting the facts in the promotional material sent to prospective clients, distorting his firm’s performance record, and failing to include disclosures that would have clarified the presentation."
    - title: "Example 6 (Performance Attribution Changes)"
      text: "Purell is reviewing the quarterly performance attribution reports for distribution to clients. Purell works for an investment management firm with a bottom-up, fundamentals-driven investment process that seeks to add value through stock selection. The attribution methodology compares each stock’s return with its sector return. The attribution report indicates that the value added this quarter came from asset allocation and that stock selection contributed negatively to the calculated return. <...> After trying several different approaches, Purell discovers that calculating attribution by comparing each stock with its industry and then rolling the effect to the sector level improves the appearance of the manager’s stock selection activities. Because the firm defines the attribution terms and the results better reflect the stated strategy, Purell recommends that the client reports should use the revised methodology."
      comment: "Modifying the attribution methodology without proper disclosure fails to meet the requirements of Standard III(D). Purell’s recommendation is being done solely for the interest of the firm to improve its perceived ability to meet the stated investment strategy. Such changes obscure the facts regarding the firm’s abilities."
    - title: "Example 7 (Performance Calculation Methodology Disclosure)"
      text: "While developing a new reporting package for existing clients, Singh, a performance analyst, discovers that her company’s new system automatically calculates both time-weighted and money-weighted returns. She asks the head of client services and retention which return type is preferred given that the firm has various investment strategies that include bonds, equities, securities without leverage, and alternatives. Singh is told not to label the returns so that the firm may show whichever performance calculation provides the highest return for the period."
      comment: "Following these instructions would lead to Singh violating Standard III(D). In reporting inconsistent return types, Singh would not be providing complete information to the firm’s clients. Complete information is provided when clients have sufficient information to judge the performance generated by the firm."
  - name: "III(E) Preservation of Confidentiality"
    tag: "3e"
    text: "Members and Candidates must keep information about current, former, and prospective clients confidential unless: \n1. The information concerns illegal activities on the part of the client, \n2. Disclosure is required by law, or \n3. The client or prospective client permits disclosure of the information."
    examples:
    - title: "Example 1 (Possessing Confidential Information)"
      text: "Connor, a financial analyst employed by Johnson Investment Counselors, Inc., provides investment advice to the trustees of City Medical Center. The trustees have given her a number of internal reports concerning City Medical’s needs for physical plant renovation and expansion. They have asked Connor to recommend investments that would generate capital appreciation in endowment funds to meet projected capital expenditures. Connor is approached by a local businessman, Kasey, who is considering a substantial contribution either to City Medical Center or to another local hospital. Kasey wants to find out the building plans of both institutions before making a decision, but he does not want to speak to the trustees."
      comment: "The trustees gave Connor the internal reports so she could advise them on how to manage their endowment funds. Because the information in the reports is clearly both confidential and within the scope of the confidential relationship, Standard III(E) prohibits Connor from divulging the information to Kasey."
    - title: "Example 2 (Disclosing Confidential Information)"
      text: "Moody is an investment officer at the Lester Trust Company. She has an advisory client who has talked to her about giving approximately US$50,000 to charity to reduce her income taxes. Moody is also treasurer of the Home for Indigent Widows (HIW), which is planning its annual giving campaign. HIW hopes to expand its list of donors, particularly those capable of substantial gifts. Moody recommends that HIW’s vice president for corporate gifts call on her client and ask for a donation in the US$50,000 range."
      comment: "Even though the attempt to help the Home for Indigent Widows was well intended, Moody violated Standard III(E) by revealing confidential information about her client."
    - title: "Example 3 (Disclosing Possible Illegal Activity)"
      text: "Samuel, the portfolio manager for Garcia Company’s pension plan, has learned from one of Garcia’s corporate officers that potentially excessive and improper charges were being made to the pension plan by the CEO of Garcia. They tell her that Garcia’s corporate tax returns are being audited and the pension fund is being reviewed. Samuel consults her employer’s general counsel and is advised that Garcia likely violated tax and fiduciary regulations and laws. Two days later, government officials contact Samuel with a request to examine pension fund records."
      comment: "Samuel and her employer should seek the advice of legal counsel to determine the appropriate steps to take to protect the interests of the participants and beneficiaries of the pension plan and comply with applicable law for responding to government regulators. Samuel may well have a duty to provide the pension fund records her firm possesses to the government."
    - title: "Example 4 (Disclosing Possible Illegal Activity)"
      text: "Bradford manages money for a family-owned real estate development corporation. He also manages the individual portfolios of several of the family members and officers of the corporation, including the chief financial officer (CFO). Based on the financial records of the corporation and some questionable practices of the CFO that Bradford has observed, Bradford believes that the CFO is embezzling money from the corporation and putting it into his personal investment account."
      comment: "Bradford should check with his firm’s compliance department or appropriate legal counsel to determine whether applicable securities regulations require reporting the CFO’s financial records to authorities."
    - title: "Example 5 (Accidental Disclosure of Confidential Information)"
      text: "Moody is an investment officer at the Lester Trust Company (LTC). She has stewardship of a significant number of individually managed taxable accounts. In addition to receiving quarterly written reports, about a dozen high-net-worth individuals have indicated to Moody a willingness to receive communications about overall economic and financial market outlooks directly from her through social media. Under the direction of her firm’s technology and compliance departments, she establishes a new group page on an existing LTC social media platform specifically for her clients. In the instructions provided to clients, Moody asks them to “join” the group so they may be granted access to the posted content. The instructions also advise clients that the platform is not an appropriate method for communicating personal or confidential information. <...> Six months later, in early January, Moody posts LTC’s year-end “Market Outlook.” The report outlines a new asset allocation strategy that the firm is adding to its recommendations in the new year. In the report, Moody indicates that she will be discussing the changes with clients individually in their upcoming meetings. <...> One of Moody’s clients responds directly on the group page that his family recently experienced a major change in their financial profile. The client describes highly personal and confidential details of the event. Unfortunately, all clients that were part of the group are also able to read the detailed posting until Moody has the comment removed."
      comment: "Moody has taken reasonable steps to protect the confidentiality of client information while using the social media platform. She provided instructions clarifying that all information posted on the site would be publicly viewable to all group members and warned against using this method for communicating confidential information. The accidental disclosure of confidential information by a client is not under Moody’s control. Her actions to remove the information promptly once she became aware further align with Standard III(E)."
    - title: "Example 6 (Vulnerable Investor)"
      text: "Gonzales, a financial adviser, provides investment advice to a number of private wealth clients. At the beginning of all client arrangements, as a part of the onboarding process, Gonzales requires the client to designate a secondary contact who Gonzales can communicate with should she become concerned about the client’s ability to make judicious financial decisions. Gonzales meets with a longtime client, Brennan, a widow, on a regular basis to discuss her portfolio. Brennan has named her son as the person to contact in the event of her mental decline. Gonzales has growing concerns about Brennan’s mental capacity over the past several months because Brennan has forgotten the last three meetings and has had to reschedule follow-up meetings. At those meetings, Brennan not only seems confused by routine matters that Gonzales knows she easily grasped in the past but also seems unclear about her long-established investment objectives. When Gonzales tries to make light of these lapses, Brennan grows uncharacteristically irritable with her. Gonzales details these meetings and interactions in her files. At the next meeting, Brennan directs Gonzales to liquidate 50% of her portfolio. Brennan informs Gonzales that she wishes to invest that money in a highly speculative private health club venture being opened by her physical therapist. Gonzales has been working with Brennan over many years, and she has always favored a widely diversified portfolio. Prior to acting on Brennan’s directive, Gonzales contacts her client’s son to discuss this situation with him. She documents in Brennan’s file the conversation with both Brennan and her son and her reasons for disclosing confidential information."
      comment: "Gonzales has taken the appropriate steps to protect Brennan’s interests by disclosing her concerns about the vulnerability of her client. Brennan previously indicated that in the event of concerns about her mental capacity, Gonzales should contact her son. Gonzales’s observation of Brennan’s mental decline and concern over the dependent relationship with her physical therapist are valid reasons to question the sudden instruction to liquidate a large portion of her investments. Gonzales is thus not in violation of the Standard III(E) Preservation of Confidentiality."
    - title: "Example 7 (Confidential Information to Family Members)"
      text: "Smith-Pelley, a financial planner, receives a call from longtime client, Carlson, who shares the news that, after a recent divorce from her husband of 37 years, she met and married a man 25 years her junior while on a holiday in another country. The man is a citizen of that country but will be moving home with Carlson. Carlson asks Smith-Pelley to liquidate half of her investment account so she can move out of her flat and into an expensive country estate with her new husband. Carlson also directs Smith-Pelley to add her new husband’s name to all her investment account documents. Carlson does as directed. Over the next six months, more funds are withdrawn from the account, mostly by Carlson’s new husband. Carlson’s children from her first marriage, also clients of Smith-Pelley, contact him to demand that their mother’s accounts be frozen, claiming she has diminished mental capacity and is being taken advantage of by the new man in her life. Smith-Pelley does nothing and refuses to discuss Carlson’s accounts with her children."
      comment: "Smith-Pelley is not in violation of his ethical duties by failing to act on Carlson’s children’s directions or discussing her account with them. Although Carlson’s recent decisions may raise red flags because the changes were sudden and unexpected, they do not indicate a loss of Carlson’s decision-making ability. As such, he is right to act for the benefit of his client, follow her direction, and keep her investment information confidential."
  - name: "IV(A) Loyalty"
    tag: "4a"
    text: "In matters related to their employment, Members and Candidates must act for the benefit of their employer and not deprive their employer of the advantage of their skills and abilities, divulge confidential information, or otherwise cause harm to their employer."
    examples:
    - title: "Example 1 (Soliciting Current Clients and Prospects)"
      text: "Magee manages pension accounts for Trust Assets, Inc. He has become frustrated with the working environment and has been offered a position with Fiduciary Management. Before resigning from Trust Assets, Magee asks four big accounts to leave that firm and open accounts with Fiduciary. Magee also persuades several prospective clients to sign agreements with Fiduciary Management. Magee previously made presentations to these prospects on behalf of Trust Assets."
      comment: "Magee violated the employer–employee principle requiring him to act solely for his employer’s benefit. Magee’s duty is to Trust Assets as long as he is employed there. Magee’s solicitation of Trust Assets’ current clients and prospective clients while still employed by the firm is unethical and violates Standard IV(A)."
    - title: "Example 2 (Former Employer’s Documents and Files)"
      text: "Hightower has been employed by Jason Investment Management Corporation for 15 years. He began as an analyst but assumed increasing responsibilities and is now a senior portfolio manager and a member of the firm’s investment policy committee. Hightower has decided to leave Jason Investment and start his own investment management business. He has been careful not to tell any of Jason Investment’s clients that he is leaving; he does not want to be accused of breaching his duty to Jason Investment by soliciting its clients before his departure. Hightower is planning to copy and take with him the following documents and information he developed or worked on while at Jason Investment: (1) the client list, with addresses, telephone numbers, and other pertinent client information; (2) client account statements; (3) sample marketing presentations to prospective clients containing the firm’s performance record; (4) Jason Investment’s recommended list of securities; (5) computer models to determine asset allocations for accounts with various objectives; (6) computer models for stock selection; and (7) spreadsheets for Hightower’s major corporate recommendations, which he developed when he was an analyst."
      comment: "Except with the consent of their employer, departing members and candidates may not take employer property, which includes books, records, reports, and other materials, because taking such materials may interfere with their employer’s business opportunities. Taking any employer records, even those the member or candidate prepared, violates Standard IV(A). Employer records include items stored in hard copy or any other medium (e.g., home computers, portable storage devices, cell phones)."
    - title: "Example 3 (Ownership of Completed Prior Work)"
      text: "Madeline, a recent college graduate and a candidate in the CFA Program, spends her summer as an unpaid intern at Murdoch and Lowell. The senior managers at Murdoch are attempting to bring the firm into compliance with the GIPS standards, and Madeline is assigned to assist in its efforts. Two months into her internship, Madeline applies for a job at McMillan & Company, which has plans to become GIPS compliant. Madeline accepts the job with McMillan. Before leaving Murdoch, she copies the firm’s software that she helped develop because she believes this software will assist her in her new position."
      comment: "Even though Madeline does not receive monetary compensation for her services at Murdoch, she used firm resources in creating the software and is considered an employee because she receives compensation and benefits in the form of work experience and knowledge. By copying the software, Madeline violated Standard IV(A) because she misappropriated Murdoch’s property without permission."
    - title: "Example 4 (Disparaging Employer)"
      text: "Nash is hired as an investment adviser working with retail clients for a regional investment advisory firm. Shortly after starting work, Nash realizes that the advisers at the firm are under pressure to churn investments in client accounts to generate fees. He brings his concerns to his immediate manager, the chief compliance officer, and ultimately to the senior managers of the firm. He is unsuccessful in getting the firm to change its practices and finds other employment at a competing firm. Upon handing in his resignation but prior to leaving his current employer, at the employer’s direction, he sends notice to clients he worked with that he will be leaving the firm and informs them that their accounts will be transferred to other portfolio managers at the firm. One of his clients contacts him and inquires more about the circumstances of his departure. Nash describes in detail the unethical practices of his firm, gives the client information about his new employer, and encourages the client to transfer her account and follow Nash to his new firm."
      comment: "Nash violated Standard IV(A) by disparaging his current employer to his client and soliciting her business for his future employer. His actions are a violation even if the client would be better off at the new firm. After leaving the firm, Nash can inform his former clients of his concerns about their treatment and suggest they change investment managers."
    - title: "Example 5 (Soliciting Former Clients)"
      text: "Elliot has hired Chisolm, who previously worked for a competing firm. Chisolm left his former firm after 18 years of employment. When Chisolm begins working for Elliot, he wants to contact his former clients because he knows them well and is certain that many will follow him to his new employer. Is Chisolm in violation of Standard IV(A) if he contacts his former clients?"
      comment: "Because client records are the property of the firm, contacting former clients for any reason through the use of client lists or other information taken from a former employer without permission is a violation of Standard IV(A). <...> Simple knowledge of the names and existence of former clients is not confidential information, just as skills or experience that an employee obtains while employed are not “confidential” or “privileged” information. The Code and Standards do not impose a prohibition on the use of experience or knowledge gained at one employer from being used at another employer. The Code and Standards also do not prohibit former employees from contacting clients of their previous firm in the absence of an agreement that prohibits such conduct. Members and candidates are free to use public information about their former firm after departing to contact former clients without violating Standard IV(A). <...> In the absence of an agreement that prohibits such conduct, as long as Chisolm maintains his duty of loyalty to his employer before joining Elliot’s firm, does not take steps to solicit clients until he has left his former firm, and does not use material from his former employer without its permission after he has left, he is not in violation of the Code and Standards."
    - title: "Example 6 (Preparation for Leaving Employer)"
      text: "Allen currently works at a registered investment company as an equity analyst. Without notice to her employer, she registers with government authorities to start an investment company that will compete with her employer, but she does not seek clients. Does registration of this competing company with the appropriate regulatory authorities constitute a violation of Standard IV(A)?"
      comment: "Allen’s preparation for the new business by registering with the regulatory authorities does not conflict with the work for her employer if the preparations have been done on Allen’s own time outside the office and if Allen will not be soliciting clients for the business or otherwise operating the new company until she has left her current employer."
    - title: "Example 7 (Competing with Current Employer)"
      text: "Several employees are planning to depart their current employer in a few weeks and have been careful to not engage in any activities that would conflict with their duty to their current employer. They have just learned that one of their employer’s clients has created a request for proposal (RFP) to review and possibly hire a new investment consultant. The RFP has been sent to the employer and all its competitors. The group believes that the new entity to be formed would be qualified to respond to the RFP and be eligible for the business. The RFP submission period is likely to conclude before the employees’ resignations are effective. Is it permissible for the group of departing employees to respond to the RFP for their anticipated new firm?"
      comment: "A group of employees responding to an RFP that their employer is also responding to would lead to direct competition between the employees and the employer. Such conduct violates Standard IV(A) unless the group of employees receives permission from their employer to respond to the RFP."
    - title: "Example 8 (Soliciting Former Clients)"
      text: "Crome has been a private banker for YBSafe Bank for the past eight years. She has been very successful and built a considerable client portfolio during that time but is extremely frustrated by the recent loss of reputation by her current employer and subsequent client insecurity. A locally renowned recruiting agent contacted Crome to offer her an attractive position with a competing private bank. This bank offers a substantial signing bonus for advisers with their own client portfolios. Crome believes that she can solicit at least 70% of her clients to follow her and gladly enters into the new employment contract."
      comment: "Crome may contact former clients upon termination of her employment with YBSafe Bank, but she is prohibited from using client records built and kept with her in her capacity as an employee of YBSafe Bank. Client lists are proprietary information of her former employer and must not be used for her or her new employer’s benefit. The use of written, electronic, or any other form of records from her prior employer, other than publicly available information, to contact her former clients at YBSafe Bank would be a violation of Standard IV(A)."
    - title: "Example 9 (Leaving an Employer)"
      text: "Research Systems Inc. (RSI) terminated the employment of Webb, one of its portfolio analysts. Webb’s employment contract included a nonsolicitation agreement that requires her to wait two years before soliciting RSI clients for any investment-related services. While at RSI, Webb connected with clients, other industry associates, and friends through her LinkedIn network. Her business and personal relationships were intermingled because she considered many of her clients to be personal friends. Upon Webb’s departure, RSI informed her clients and introduced her replacement. Webb updated her LinkedIn profile several days after her departure from RSI. LinkedIn automatically sent a notification to Webb’s entire network that her employment status had changed."
      comment: "Webb’s actions did not violate Standard IV(A). Webb updated her LinkedIn profile only after her employment ended. The updated employment profile notification by LinkedIn does not amount to solicitation of clients. Best practice would dictate that Webb maintain separate accounts for her personal and professional social media activities. At a minimum, prior to her departure from the firm, Webb should discuss with RSI how to address any client information contained in her social media networks."
    - title: "Example 10 (Confidential Firm Information)"
      text: "Gupta is a research analyst at Naram Investment Management (NIM). NIM uses a team-based research process to develop recommendations on investment opportunities covered by the team members. Gupta, like others, provides commentary for NIM’s clients through the company blog, which is posted weekly on NIM’s password-protected website. According to NIM’s policy, every contribution to the website must be approved by the company’s compliance department before posting. Any opinions expressed on the website are disclosed as representing the perspective of NIM. Gupta also writes a personal blog to share his experiences with friends and family. Gupta’s personal blog is widely available to interested readers. Occasionally, when he disagrees with the team-based research opinions of NIM, Gupta uses his personal blog to express his own opinions as a counterpoint to the commentary posted on the NIM website. Gupta believes this provides his readers with a more complete perspective on these investment opportunities."
      comment: "Gupta violated Standard IV(A) by disclosing confidential firm information through his personal blog. The recommendations on the firm’s blog to clients are not freely available across the internet, but his personal blog post indirectly provides the firm’s recommendations. Additionally, by posting research commentary on his personal blog, Gupta is using firm resources for his personal advantage."
  - name: "IV(B) Additional Compensation Arrangements"
    tag: "4b"
    text: "Members and Candidates must not accept gifts, benefits, compensation, or consideration that competes with or might reasonably be expected to create a conflict of interest with their employer’s interest unless they obtain written consent from all parties involved."
    examples:
    - title: "Example 1 (Notification of Client Bonus Compensation)"
      text: "Whitman, a portfolio analyst for Adams Trust Company (ATC), manages the account of Cochran, a client. Whitman is paid a salary by his employer, and Cochran pays ATC a standard fee based on the market value of assets in her portfolio. Cochran proposes to Whitman that “any year that my portfolio achieves at least a 15% return before taxes, you and your wife can fly to Monaco at my expense and use my condominium during the third week of January.” Whitman does not inform his employer of the arrangement and vacations in Monaco the following January as Cochran’s guest."
      comment: "Whitman violated Standard IV(B) by failing to inform his employer in writing of this supplemental, contingent compensation arrangement. The nature of the arrangement could result in partiality to Cochran’s account, which could detract from Whitman’s performance with respect to other accounts he handles for ATC. Whitman must obtain the consent of his employer to accept such a supplemental compensation arrangement."
    - title: "Example 2 (Notification of Outside Compensation)"
      text: "Jones, a senior portfolio manager for Clarksville Asset Management, is on the board of directors of Exercise Unlimited, Inc. In return for his services on the board, Jones receives unlimited membership privileges for his family at all Exercise Unlimited facilities. Jones recommends purchasing Exercise Unlimited stock for his Clarksville client accounts for which it is appropriate. Jones does not disclose this arrangement to his employer because he does not receive monetary compensation for his services on the board."
      comment: "Jones violated Standard IV(B) by failing to disclose to his employer benefits received in exchange for his services on the board of directors. Jones’ service as a board director creates a conflict of interest because he has a personal incentive for recommending Exercise Unlimited stock. Nonmonetary compensation may create a conflict of interest in the same manner as being paid to serve as a director."
    - title: "Example 3 (Prior Approval for Outside Compensation)"
      text: "Hollis is an analyst of oil-and-gas companies for Specialty Investment Management. He is currently recommending the purchase of ABC Oil Company shares and has published a long, well-thought-out research report to substantiate his recommendation. Several weeks after publishing the report, Hollis receives a call from the investor relations office of ABC Oil saying that Andrews, CEO of the company, saw the report and likes the analyst’s grasp of the business and his company. The investor relations officer invites Hollis to visit ABC Oil to discuss the industry further. ABC Oil offers to send a company plane to pick Hollis up and arrange for his accommodations while visiting. Hollis, after gaining the appropriate approvals, accepts the meeting with the CEO but declines the offered travel arrangements. Several weeks later, Andrews and Hollis meet to discuss the oil business and Hollis’s report. Following the meeting, Hollis joins Andrews and the investment relations officer for dinner at an upscale restaurant near ABC Oil’s headquarters. Upon returning to Specialty Investment Management, Hollis provides a full review of the meeting to the director of research, including a disclosure of the dinner attended."
      comment: "Hollis’s actions did not violate Standard IV(B). Through gaining approval before accepting the meeting and declining the offered travel arrangements, Hollis sought to avoid any potential conflicts of interest between his company and ABC Oil. By disclosing the dinner upon his return, Hollis enabled Specialty Investment Management to assess whether it has any impact on future reports and recommendations by Hollis related to ABC Oil."
  - name: "IV(C) Responsibilities of Supervisors"
    tag: "4c"
    text: "Members and Candidates must make reasonable efforts to ensure that anyone subject to their supervision or authority complies with applicable laws, rules, regulations, and the Code and Standards."
    examples:
    - title: "Example 1 (Supervising Research Activities)"
      text: "Mattock is senior vice president and head of research at H&V, Inc., a regional brokerage firm. She is responsible for H&V’s compliance procedures related to dissemination of research. Mattock has decided to change her recommendation for Timber Products from buy to sell. She orally advises other H&V executives of her proposed actions before the report is prepared for publication, as required by H&V’s compliance procedures. However, Mattock did not implement procedures designed to prevent dissemination of or trading on the information by those who are informed of changed recommendations. As a result of Mattock’s conversation with Frampton, one of the H&V executives reporting to Mattock, Frampton immediately sells Timber’s stock from his own account and from certain discretionary client accounts. In addition, other personnel inform certain institutional customers of the changed recommendation before it is printed and disseminated to all H&V customers who have received previous Timber reports."
      comment: "Mattock violated Standard IV(C) by failing to reasonably and adequately supervise the actions of those accountable to her. In her role as senior vice president and head of research, she must ensure that her firm has procedures for reviewing or recording any trading in the stock of a corporation that has been the subject of an unpublished change in recommendation. If adequate procedures had been established and followed, subordinates would have been informed of their duties, which would have facilitated detection of the improper sales by Frampton and prevented selected disclosure of the recommendation to clients."
    - title: "Example 2 (Supervising Trading Activities)"
      text: "Edwards, a trainee trader at Wheeler & Company, a major national brokerage firm, assists a client in paying for the securities of Highland, Inc., by using anticipated profits from the immediate sale of the same securities. Despite the fact that Highland is not on Wheeler’s recommended list, a large volume of the company’s stock is traded through Wheeler in this manner. Mason is a vice president at Wheeler, responsible for supervising compliance with the securities laws in the trading department. Part of her compensation from Wheeler is based on commission revenues from the trading department. Although she notices the increased trading activity, she does nothing to investigate or halt it."
      comment: "Mason’s failure to adequately review and investigate purchase orders in Highland stock executed by Edwards and her failure to supervise the trainee’s activities violate Standard IV(C). Supervisors must be especially sensitive to actual or potential conflicts between their own self-interests and their supervisory responsibilities."
    - title: "Example 3 (Supervising Trading Activities and Recordkeeping)"
      text: "Tabbing is senior vice president and portfolio manager for Crozet, Inc., a registered investment advisory and registered broker/dealer firm. She reports to Claudius, the president of Crozet. Crozet serves as the investment adviser and principal underwriter for ABC and XYZ public mutual funds. The two funds’ prospectuses allow Crozet to trade financial futures for the funds for the limited purpose of hedging against market risks. Claudius, extremely impressed by Tabbing’s performance in the past two years, directs Tabbing to act as portfolio manager for the funds. For the benefit of its employees, Crozet has also organized the Crozet Employee Profit-Sharing Plan (CEPSP), a defined contribution retirement plan. Claudius assigns Tabbing to manage 20% of the assets of CEPSP. Tabbing’s investment objective for her portion of CEPSP’s assets is aggressive growth. Unbeknownst to Claudius, Tabbing frequently places S&P 500 Index futures purchase and sale orders for the funds and the CEPSP without providing the futures commission merchants (FCMs) who take the orders with any prior or simultaneous designation of the account for which the trade has been placed. Frequently, neither Tabbing nor anyone else at Crozet completes an internal trade ticket to record the time an order was placed or the specific account for which the order was intended. FCMs often designate a specific account only after the trade, when Tabbing provides such designation. Crozet has no written operating procedures or compliance manual concerning its futures trading, and its compliance department does not review such trading. After observing the market’s movement, Tabbing assigns to CEPSP the S&P 500 positions with more favorable execution prices and assigns positions with less favorable execution prices to the funds."
      comment: "Claudius violated Standard IV(C) by failing to adequately supervise Tabbing with respect to her S&P 500 trading. Claudius further violated Standard IV(C) by failing to establish recordkeeping and reporting procedures to prevent or detect Tabbing’s violations. Claudius must make a reasonable effort to determine that adequate compliance procedures covering all employee trading activity are established, documented, communicated, and followed."
    - title: "Example 4 (Accepting Responsibility)"
      text: "Rasmussen works on a buy-side trading desk and concentrates on in-house trades for a hedge fund subsidiary managed by a team at the investment management firm. The hedge fund has been very successful and is marketed globally by the firm. From her experience as the trader for much of the activity of the fund, Rasmussen has become quite knowledgeable about the hedge fund’s strategy, tactics, and performance. When a distinct break in the market occurs and many of the securities involved in the hedge fund’s strategy decline markedly in value, however, Rasmussen observes that the reported performance of the hedge fund does not at all reflect this decline. From her experience, this lack of an effect is a very unlikely occurrence. She approaches Blair, her supervisor and the head of trading, about her concern and is told that she should not ask any questions and that the fund is too big and successful and is not her concern. She is certain that something is not right, so she contacts Saunders, the firm’s compliance officer, and is again told not to pursue the hedge fund reporting issue."
      comment: "Rasmussen has concerns about potential misconduct at her firm and brings them to the attention of supervisory personnel. Under Standard IV(C), Blair and Saunders, the supervisor and the compliance officer, have the responsibility to review the concerns brought forth by Rasmussen. Supervisors have the responsibility of establishing and encouraging an ethical culture in the firm and investigating potential misconduct. The dismissal of Rasmussen’s question violates Standard IV(C) and undermines the firm’s ethical operations."
    - title: "Example 5 (Supervising Research Activities)"
      text: "Burdette is hired by Fundamental Investment Management (FIM) as a junior auto industry analyst. She is expected to expand the social media presence of the firm. Burdette’s supervisor, Graf, encourages Burdette to explore opportunities to increase FIM’s online presence and ability to share content, communicate, and broadcast information to clients. Graf has not yet established policies and procedures for the firm that govern online communications. <...> As part of her auto industry research for FIM, Burdette is drafting a report on the financial impact of Sun Drive Auto Ltd.’s new solar technology for compact automobiles. This research report will be her first for FIM, and she believes Sun Drive’s technology could revolutionize the auto industry. In her excitement, Burdette posts a summary of her “buy” recommendation for Sun Drive Auto stock on her personal social media accounts."
      comment: "Graf violated Standard IV(C) by failing to reasonably supervise Burdette with respect to her actions. He did not establish reasonable procedures to prevent the unauthorized dissemination of company research through social media networks. Graf must make sure all employees receive regular training about FIM’s policies and procedures, including the appropriate business use of personal social media networks."
    - title: "Example 6 (Supervising Branch Employees)"
      text: "Sokol is an investment adviser at a regional branch of Final Frontier Wealth Management (FFWM). Bartlett, FFWM’s compliance officer, is responsible for overall compliance of the firm’s investment advisers at all the company’s branches. For several years, Sokol directs over 100 of his retail clients to invest in a Feeder Fund, which provides its clients access to invest in another fund, the Alpha Fund. Alpha’s strategy uses complex option strategies and synthetic futures positions, which carry speculative and substantial risks with high volatility. Sokol recommends that his clients invest in the Feeder Fund without adequately assessing whether the product is suitable for them. Consequently, some of his clients with low risk tolerances and conservative trading preferences invest in the Feeder Fund. Due to extreme volatility in equity markets, Alpha loses about 35% of its value, resulting in losses of approximately $16 million for Frontier’s clients who invested in the Feeder Fund."
      comment: "Bartlett’s actions violated Standard IV(C). Bartlett’s inadequate policies, procedures, training, and supervision allowed Sokol to recommend the Feeder Fund without properly assessing whether the investment was suitable for each client. Bartlett failed to supervise Sokol and failed to adopt and implement written policies and procedures for FFWM designed to prevent investment advisory representatives at FFWM from recommending complex financial products to clients when they are not suitable."
    - title: "Example 7 (Detecting Violations)"
      text: "D’Addario is a trader for a broker/dealer, BOAC. D’Addario enters into an agreement with Amity Point Investments, a significant customer of BOAC, to provide artificially inflated price quotes for mortgage-backed securities in return for the promise of security trades being sent to BOAC. Amity Point uses those quotes to inflate the value of securities it holds and report inflated monthly valuations and net asset values for several of its funds. As part of the arrangement, Amity Point tells D’Addario the prices it wants to receive for certain bonds in the funds’ portfolios, and D’Addario gives Amity Point the valuations it requests. Bartolucci, BOAC’s chief executive officer, who is responsible for overall supervision at BOAC and is also D’Addario’s supervisor, knows that D’Addario is providing price quotes to BOAC customers as part of the brokerage business. However, Bartolucci does not develop policies or procedures concerning the provision of price quotes to clients."
      comment: "Bartolucci’s conduct violated Standard IV(C) by failing to develop, promote, and train employees on adequate policies governing the provision of price quotes to their customers. Bartolucci failed to supervise D’Addarrio to prevent and detect D’Addario’s illegal and unethical activities."
  - name: "V(A) Diligence and Reasonable Basis"
    tag: "5a"
    text: "Members and Candidates must: \n1. Exercise diligence, independence, and thoroughness in analyzing investments, making investment recommendations, and taking investment actions. \n2. Have a reasonable and adequate basis, supported by appropriate research and investigation, for any investment analysis, recommendation, or action."
    examples:
    - title: "Example 1 (Sufficient Due Diligence)"
      text: "Hawke manages the corporate finance department of Sarkozi Securities, Ltd. The firm is anticipating that the government will soon close a tax loophole that currently allows oil-and-gas exploration companies to pass on drilling expenses to holders of a certain class of shares. Because market demand for this tax-advantaged class of stock is currently high, Sarkozi convinces several companies to undertake new equity financings at once, before the loophole closes. Time is of the essence, but Sarkozi lacks sufficient resources to conduct adequate research on all the prospective issuing companies. Hawke decides to estimate the IPO prices based on the relative size of each company and to justify the pricing later when her staff has time."
      comment: "By categorizing the issuers by general size, Hawke bypassed researching all the other relevant aspects that must be considered when pricing new issues and thus did not perform sufficient due diligence. Hawke violated Standard V(A)."
    - title: "Example 2 (Timely Client Updates)"
      text: "Chandler is an investment consultant in the London office of Dalton Securities, a major global investment consultant firm. One of her UK pension funds has decided to appoint a specialist US equity manager. Dalton’s global manager of research relies on local consultants to review and assess managers in their regions and, after conducting thorough due diligence, puts their views and ratings in Dalton’s manager database. Chandler accesses Dalton’s global manager research database and conducts a screen of all US equity managers on the basis of a match with the client’s desired philosophy/style, performance, and tracking-error targets. She selects the five managers that meet these criteria and puts them in a briefing report that is delivered to the client. Between the time of her database search and the delivery of the report to the client, Chandler discovers that one of the firms that she recommended for consideration lost its chief investment officer, the head of its US equity research, and the majority of its portfolio managers on the US equity product—all of whom have left to establish their own firm. Chandler does not revise her report with this updated information."
      comment: "Chandler failed to satisfy the requirement of Standard V(A) because she did not update her report to reflect the new information."
    - title: "Example 3 (Group Research Opinions)"
      text: "Mastakis is a junior analyst who has been asked by her firm to write a research report predicting the expected interest rate for residential mortgages over the next six months. Mastakis submits her report to the fixed-income investment committee of her firm for review, as required by the firm’s procedures. Although some committee members support Mastakis’s conclusion, the majority of the committee disagrees with her conclusion, and the report is significantly changed to indicate that interest rates are likely to increase more than originally predicted by Mastakis. Mastakis asks that her name be taken off the report when it is disseminated."
      comment: "Generally, analysts must write research reports that reflect their own opinion. But the results of research are not always definitive, and different people may have different opinions based on the same factual evidence. When research is a group effort, however, not all members of the team may agree with all aspects of the report. In this case, the committee may have valid reasons for issuing a report that differs from the analyst’s original research if there is a reasonable and adequate basis for its conclusions. Ultimately, members and candidates can ask to have their names removed from the report, but if they are satisfied that the process has produced results or conclusions that have a reasonable and adequate basis, members and candidates do not have to dissociate from the report even when they do not agree with its contents. If Mastakis is confident in the process, she does not need to dissociate from the report even if it does not reflect her opinion."
    - title: "Example 4 (Reliance on Third-Party Research)"
      text: "McDermott runs a two-person investment management firm. McDermott’s firm subscribes to a service from a large investment research firm that provides research reports. McDermott’s firm makes investment recommendations based on these reports."
      comment: "Members and candidates may rely on third-party research but must make reasonable and diligent efforts to determine that such research is sound. If McDermott undertakes due diligence efforts on a regular basis to ensure that the research produced by the large firm is objective and reasonably based, McDermott may rely on that research when making investment recommendations to clients."
    - title: "Example 5 (Due Diligence in Subadviser Selection)"
      text: "Ostrowski’s business has grown significantly over the past few years, and some clients want to diversify internationally. Ostrowski decides to find a subadviser to handle international investments. Because this will be his first subadviser, Ostrowski uses the CFA Institute Model Request for Proposal to design a questionnaire for his search. By his deadline, he receives seven completed questionnaires from a variety of domestic and international firms trying to gain his business. Ostrowski reviews all the applications but feels unqualified in choosing the best firm. He decides to select the firm that charges the lowest fees because doing so will have the least impact on his firm’s bottom line."
      comment: "The selection of an external adviser or subadviser must be based on a full and complete review of the adviser’s services, performance history, and cost structure. In basing the decision on the fee structure alone, Ostrowski violated Standard V(A)."
    - title: "Example 6 (Sufficient Due Diligence)"
      text: "Thompson provides research for the portfolio manager of the fixed-income department at his firm. The manager asks Thompson to conduct sensitivity analysis on securitized subprime mortgages. He has discussed with the manager possible scenarios to use to calculate expected returns. A key assumption in such calculations is housing price appreciation (HPA) because it drives “prepays” (prepayments of mortgages) and potential losses. Thompson is concerned with the significant appreciation experienced over the previous five years as a result of the increased availability of funds from subprime mortgages. To project a worst-case scenario, Thompson insists that the analysis should include a scenario run with an assumed HPA of –10% for Year 1, –5% for Year 2, and 0% for Years 3 through 5. The manager replies that these assumptions are too dire because there has never been a time in their available database when HPA was negative. Thompson conducts research to better understand the risks inherent in these securities and evaluates these securities in the worst-case scenario, an unlikely but possible environment. Based on the results of these scenarios, Thompson does not recommend the purchase of the investment."
      comment: "Thompson understands the limitations of his model, when combined with the limited available historical information, to accurately predict the performance of the funds if market conditions change negatively. Thompson’s actions in running the scenario test with inputs beyond the historical trends available in the firm’s databases adhere to the principles of Standard V(A)."
    - title: "Example 7 (Use of Quantitatively Oriented Models)"
      text: "Liakos works in sales for Hellenica Securities, a firm specializing in developing intricate derivative strategies to profit from particular views on market expectations. One of her clients is Carapalis, who is convinced that commodity prices will become more volatile over the coming months. Carapalis asks Liakos to quickly engineer a strategy that will benefit from this expectation. Liakos turns to Hellenica’s modeling group to fulfill this request. Because of the tight deadline, the modeling group outsources parts of the work to several trusted third parties. Liakos implements the disparate components of the strategy as the firms complete them. Within a month, Carapalis is proven correct: Volatility across a range of commodities increases sharply. But her derivatives position with Hellenica suffers huge losses, and the losses increase daily. Liakos investigates and realizes that although each of the various components of the strategy had been validated, they had never been evaluated as an integrated whole. In extreme conditions, portions of the model worked at cross-purposes with other portions, causing the overall strategy to fail dramatically."
      comment: "Liakos violated Standard V(A). Members and candidates must understand the statistical significance of the results of the models they recommend and must be able to explain them to clients. Liakos did not take adequate care to ensure a thorough review of the whole model; its components were evaluated only individually. Because Carapalis clearly intended to implement the strategy as a whole rather than as separate parts, to comply with the standard, Liakos should have tested how the components of the strategy interacted in addition to how they performed individually."
    - title: "Example 8 (Successful Due Diligence/Failed Investment)"
      text: "Newbury is an investment adviser to high-net-worth clients. A client with an aggressive risk profile in his investment policy statement asks about investing in the Top Shelf hedge fund. This fund has reported 20% returns for the first three years. The fund prospectus states that its strategy involves long and short positions in the energy sector and extensive leverage. Based on his analysis of the fund’s track record, the principals involved in managing the fund, the fees charged, and the fund’s risk profile, Newbury recommends the fund to the client and secures a position in it. Six months later, the fund announces that it has suffered a loss of 60% of its value and is suspending operations and redemptions until after a regulatory review."
      comment: "Newbury’s actions were consistent with Standard V(A). Analysis of an investment that results in a reasonable basis for recommendation does not guarantee that the investment has no downside risk. Newbury must discuss the analysis process with the client while reminding the client that past performance does not lead to guaranteed future gains and that losses in an aggressive investment portfolio should be expected."
    - title: "Example 9 (Quantitative Model Diligence)"
      text: "Cannon is the lead quantitative analyst at CityCenter Hedge Fund. He is responsible for the development, maintenance, and enhancement of the proprietary models the fund uses to manage its investors’ assets. Cannon reads several high-level mathematical publications and blogs to stay informed of current developments. One blog, run by “Expert CFA,” presents some intriguing research that may benefit one of CityCenter’s current models. Cannon is under pressure from the firm’s executives to improve the model’s predictive abilities, and he incorporates the factors discussed in the online research. The updated output recommends several new investments to the fund’s portfolio managers."
      comment: "Cannon violated Standard V(A) by failing to have a reasonable basis for the new recommendations made to the portfolio managers. He needed to diligently research the effect of incorporating the new factors before offering the output recommendations. Cannon may use the blog for ideas, but it is his responsibility to determine the effect on the firm’s proprietary models."
    - title: "Example 10 (Selecting a Service Provider)"
      text: "Stefansson is a performance analyst at Artic Global Advisers, a firm that manages global equity mandates for institutional clients. Her supervisor asks her to review five new performance attribution systems and recommend one that would best explain the firm’s investment strategy to clients. On the list is a system she recalls learning about when visiting an exhibitor booth at a recent conference. The system is highly quantitative and opaque in how it calculates the attribution values. Stefansson recommends this option without researching the others on the basis of the impressive discussion she had at the exhibitor booth with company representatives."
      comment: "Stefansson’s actions violate Standard V(A) because they do not demonstrate a sufficient level of diligence in reviewing the performance attribution product to make a recommendation for selecting the service. Besides not reviewing or considering the other four potential systems, she did not determine whether the attribution process aligns with the investment practices of the firm, including its investments in different countries and currencies. Stefansson must review and understand the process of any software or system before recommending its use as the firm’s attribution system."
    - title: "Example 11 (Subadviser Selection)"
      text: "Jackson works for Armaniams Partners, Inc., and is assigned to select a hedge fund subadviser to improve the diversification of the firm’s large fund-of-funds product. The allocation must be in place before the start of the next quarter. Jackson uses a consultant database to find a list of suitable firms that claim compliance with the GIPS standards. He calls more than 20 firms on the list to confirm their potential interest and to determine their most recent quarterly and annual total returns. Because of the short turnaround, Jackson recommends the firm with the greatest total returns for selection."
      comment: "By considering only performance and GIPS compliance, Jackson did not conduct sufficient review of potential firms to satisfy the requirements of Standard V(A). Jackson must thoroughly investigate the firms and their operations to ensure that their addition would increase the diversification of clients’ portfolios and that they are suitable for the fund-of-funds product."
    - title: "Example 12 (Technical Model Requirements)"
      text: "Dupont works for the credit research group of XYZ Asset Management, where he is in charge of developing and updating credit risk models. In order to perform accurately, his models need to be regularly updated with the latest market data. Dupont does not interact with or manage money for any of the firm’s clients. He is in contact with the firm’s US corporate bond fund manager, Reichardt, who has only very superficial knowledge of the model. <...> Dupont’s recently assigned objective is to develop a new emerging market corporate credit risk model. The firm is planning to expand into emerging credit, and the development of such a model is a critical step in this process. Because Reichardt seems to follow the model’s recommendations without much concern for its quality as he develops his clients’ investment strategies, Dupont decides to focus his time on the development of the new emerging market model and neglects to update the US model. <...> After several months without regular updates, Dupont’s diagnostic statistics start to show alarming signs with respect to the quality of the US credit model. Instead of conducting a long and complicated data update, Dupont introduces new codes into his model with some limited new data as a quick “fix.” He thinks this change will address the issue without needing to complete the full data update. <...> Several months later, another set of diagnostic statistics reveals nonsensical results, and Dupont realizes that his earlier change contained an error. He quickly corrects the error and alerts Reichardt, who has made trades based on the erroneous model’s results."
      comment: "Dupont violated Standard V(A) even if he does not trade securities or make investment decisions. Dupont’s models give investment recommendations, and Dupont is accountable for the quality of those recommendations. Members and candidates must make reasonable efforts to test the output of preprogrammed analytical tools they use. Such validation must occur before incorporating the tools into their decision-making process. Reichardt violated standard V(A) because he does not understand the model he is relying on to manage money. <...> Members and candidates must understand the parameters used in models that are incorporated into their investment recommendations. Although they are not required to become experts in every technical aspect of the models they use, they must understand the assumptions and limitations inherent in these models and how the results are used in the decision-making process."
  - name: "V(B) Communication with Clients and Prospective Clients"
    tag: "5b"
    text: "Members and Candidates must: \n1. Disclose to clients and prospective clients the nature of the services provided, along with information about the costs to the client associated with those services. \n2. Disclose to clients and prospective clients the basic format and general principles of the investment processes they use to analyze investments, select securities, and construct portfolios and must promptly disclose any changes that might materially affect those processes. \n3. Disclose to clients and prospective clients significant limitations and risks associated with the investment process. \n4. Use reasonable judgment in identifying which factors are important to their investment analyses, recommendations, or actions and include those factors in communications with clients and prospective clients. \n5. Distinguish between fact and opinion in the presentation of investment analysis and recommendations."
    examples:
    - title: "Example 1 (Costs of Services to Clients)"
      text: "The nature of ABC Capital Private Equity Fund III’s investments requires ABC Capital to routinely provide structuring advice to the companies in which the fund invests, for which ABC Capital charges a fee to those companies. The policy of ABC Capital is to remit the fees it earns for structuring advice to the fund if the investment in the underlying company decreases in value but to retain the fees if the investment increases in value. The private placement memorandum does not disclose this arrangement, because the firm’s CEO, Alphonso, views it as a common industry practice and believes it provides a “win-win” for investors. ABC Capital’s services contribute significantly to the returns enjoyed by the fund’s investors, and ABC Capital earns a substantial fee."
      comment: "Alphonso is in violation of Standard V(B) because the compensation received by ABC Capital has not been disclosed to clients who are investors in the fund. Alphonso may not rely on the sophistication of clients and their assumed understanding of the nature and details of the fee arrangements with underlying companies in which ABC Capital invests as a reason for not providing the information required by this standard. This is true even though investors in ABC Capital Private Equity Fund III benefit from the arrangement."
    - title: "Example 2 (Costs of Services to Clients)"
      text: "Jones is an investment adviser tasked with completing a manager search for a client’s portfolio. The search mandate is to identify a short list of investment managers who offer core fixed-income strategies managed to the benchmark identified in the client’s investment policy statement. Jones begins her search with a set of criteria defined by her firm’s manager search process policy. She identifies three candidates that fulfill these criteria but notices that her top-ranked manager has significantly higher fees than the other candidates on her list. Her firm’s search criteria list fees as less important relative to the other criteria to rank investment managers. To present investment performance for uniform comparison, Jones creates a fee comparison chart that lists each manager’s performance on a gross-of-fees basis. She presents gross-of-fees performance over the same time periods and relative to the same benchmark. She also calculates the total amount of fees that would have been paid during each of the performance time periods presented. Finally, she lists each manager’s fee schedule and any fees that may be charged in addition to the published fees. She explains to her client that prior to final selection, the investment managers will be required to present their final fee proposal."
      comment: "Jones’s presentation of manager fees is appropriate because she provided a uniform comparison of manager services. Her presentation adheres to Standard V(B), which requires disclosure about the nature of services provided, along with information about the costs associated with those services."
    - title: "Example 3 (Disclosure of Changed Fee Calculation Methodology)"
      text: "Maalouf works in a branch office for a large wealth management firm. The firm’s fees are based on a percentage of the value of the assets managed in each client account. The firm has a standard method for valuing assets and calculating fees for all its clients, which is disclosed to each client at the outset of the relationship. Maalouf becomes aware that, over time, the firm has transitioned to (1) using the market value of client assets at the end of the billing cycle instead of the average daily balance of the account and (2) including cash and cash equivalents in the fee calculation, which were previously excluded."
      comment: "Advisory fees are critical information that clients need to know. When investment advisers develop and maintain clear, frequent, and thorough communication with clients about the costs of their services, clients can make well-informed decisions about their investments, including about whether to engage or retain an investment adviser. Maalouf and his firm may change the advisory fee calculation methodology and policies over time for existing accounts, but Maalouf must make clients aware of any such changes. Maalouf violated Standard V(B); it is improper to change the fee calculation methodology without disclosure even if it results in lower fees."
    - title: "Example 4 (Sufficient Disclosure of Investment System)"
      text: "Williamson, director of marketing for Country Technicians, Inc., is convinced that she has found the perfect formula for increasing Country Technicians’ income and diversifying its product base. Williamson plans to build on Country Technicians’ reputation as a leading money manager by marketing an exclusive and expensive investment advice letter to high-net-worth individuals. One hitch in the plan is the complexity of Country Technicians’ investment system—a combination of technical trading rules (based on historical price and volume fluctuations) and portfolio construction rules designed to minimize risk. To simplify the newsletter, she decides to include only each week’s top five “buy” and “sell” recommendations and to leave out details of the valuation models and the portfolio structuring scheme."
      comment: "Williamson’s plans for the newsletter violate Standard V(B). Williamson need not describe the investment system in detail in order to implement the advice effectively, but she must inform clients of Country Technicians’ basic process. Without understanding the basis for a recommendation, clients cannot evaluate its limitations or its inherent risks."
    - title: "Example 5 (Providing Opinions as Facts)"
      text: "Dox is a mining analyst for East Bank Securities. He has just finished his report on Boisy Bay Minerals. Included in his report is his own assessment of the geological extent of mineral reserves likely to be found on the company’s land. Dox completed this calculation on the basis of the core samples from the company’s latest drilling. According to Dox’s calculations, the company has more than 500,000 ounces of gold on the property. Dox concludes his research report as follows: “Based on the fact that the company has 500,000 ounces of gold to be mined, I recommend a strong buy.”"
      comment: "Dox violated Standard V(B). His calculation of the total gold reserves for the property based on the company’s recent sample drilling is a quantitative opinion, not a fact. Opinion must be distinguished from fact in research reports."
    - title: "Example 6 (Proper Description of a Security)"
      text: "Thomas, an analyst at Government Brokers, Inc., a brokerage firm specializing in government bond trading, has produced a report that describes an investment strategy designed to benefit from an expected decline in US interest rates. The firm’s derivative products group has designed a structured product that will allow the firm’s clients to benefit from this strategy. Thomas’s report describing the strategy indicates that high returns are possible if various scenarios for declining interest rates are assumed. Citing the proprietary nature of the structured product underlying the strategy, the report does not describe in detail how the firm may be able to offer such returns or the related risks in the scenarios, nor does the report address the likely returns of the strategy if, contrary to expectations, interest rates rise."
      comment: "Thomas violated Standard V(B) because her report fails to describe properly the basic characteristics of the actual and implied risks of the investment strategy, including how the structure was created and the degree to which leverage was embedded in the structure. The report must include a balanced discussion of how the strategy would perform in the case of both rising and falling interest rates, preferably illustrating how the strategies might be expected to perform in the event of a reasonable variety of interest rate and credit risk–spread scenarios. If liquidity issues are relevant to the valuation of either the derivatives or the underlying securities, Thomas must address those risks as well."
    - title: "Example 7 (Notification of Fund Mandate Change)"
      text: "May & Associates is an aggressive growth manager that represents itself as a specialist at investing in small-cap US stocks. One of May’s selection criteria is a maximum capitalization of US$2 billion for any given company. After a string of successful years of superior performance relative to its peers, May has expanded its client base significantly, to the point at which assets under management now exceed US$20 billion. For liquidity purposes, May’s chief investment officer, Clio, decides to lift the maximum permissible market-cap ceiling to US$8 billion and change the firm’s sales and marketing literature accordingly to inform prospective clients and third-party consultants."
      comment: "Although Clio appropriately informs potentially interested parties about the change in investment process, he must also notify May’s existing clients. Among the latter group might be a number of clients who not only retained May as a small-cap manager but also retained mid-cap specialists in a multiple-manager approach. Such clients may regard May’s change of criteria as a style change that distorts their overall asset allocations."
    - title: "Example 8 (Notification of Fund Mandate Change)"
      text: "In addition to lifting the ceiling for May & Associates’ universe from US$2 billion to US$8 billion, Clio extends the firm’s small-cap universe to include a number of non-US companies."
      comment: "Standard V(B) requires Clio to advise May’s clients of this change because the firm may have been retained by some clients specifically for its prowess at investing in US small-cap stocks. Clio must disclose changes in the investment process to all interested parties."
    - title: "Example 9 (Notification of Changes to the Investment Process)"
      text: "RJZ Capital Management is an active value-style equity manager that selects stocks by using a combination of four multifactor models. The firm has found favorable results when backtesting the most recent 10 years of available market data in a new dividend discount model designed by the firm. This model is based on projected inflation rates, earnings growth rates, and interest rates. Rodriguez, the president of RJZ, decides to replace its simple model that uses price to trailing 12-month earnings with the new model."
      comment: "Because the introduction of a new and different valuation model represents a material change in the investment process, Rodriguez must communicate the change to the firm’s clients. RJZ is replacing a model based on hard data with a new model that is at least partly dependent on the firm’s forecasting skills. This is a significant change rather than a mere refinement of RJZ’s process."
    - title: "Example 10 (Notification of Changes to the Investment Process)"
      text: "At Fundamental Asset Management, Inc., the responsibility for selecting stocks for the firm’s “approved” list recently shifted from individual security analysts to a committee consisting of the research director and three senior portfolio managers. Morales, a portfolio manager with Fundamental Asset Management, believes this change is not important enough to communicate to her clients."
      comment: "Standard V(B) requires Morales to disclose the process change to all her clients because this is a fundamental change to stock selection for the fund."
    - title: "Example 11 (Sufficient Disclosure of Investment System)"
      text: "Chinn is the investment director for Diversified Asset Management, which manages the endowment of a charitable organization. Because of recent staff departures, Diversified has decided to limit its direct investment focus to large-cap securities and supplement the needs for small-cap and mid-cap management by hiring outside fund managers. In describing the planned strategy change to the charity, Chinn’s update letter states, “As investment director, I will directly oversee the investment team managing the endowment’s large-capitalization allocation. I will coordinate the selection and ongoing review of external managers responsible for allocations to other classes.” The letter also describes the reasons for the change and the characteristics external managers must have to be considered."
      comment: "Standard V(B) requires the disclosure of the investment process used to construct the portfolio of the endowment fund. Changing the investment process from managing all classes of investments within the firm to the use of external managers is an example of information about the investment process that must be communicated to clients. The charity can now make a reasonable decision about whether Diversified Asset Management remains the appropriate manager for its endowment."
    - title: "Example 12 (Notification of Risks and Limitations)"
      text: "Quantitative analyst Yakovlev has developed an investment strategy that selects small-cap stocks on the basis of quantitative signals. Yakovlev’s strategy typically identifies only a small number of stocks (10–20) that tend to be illiquid, but according to his backtests, the strategy generates significant risk-adjusted returns. The partners at Yakovlev’s firm, QSC Capital, are impressed by these results. After a thorough examination of the strategy’s risks, stress testing, historical backtesting, and scenario analysis, QSC decides to seed the strategy with US$10 million of internal capital in order for Yakovlev to create a track record for the strategy. <...> After two years, the strategy has generated performance returns greater than those of the appropriate benchmark and the Sharpe ratio of the fund is close to 1.0. On the basis of these results, QSC decides to actively market the fund to large institutional investors. While creating the offering materials, Yakovlev informs the marketing team that the capacity of the strategy is limited. The extent of the limitation is difficult to ascertain with precision; it depends on market liquidity and other factors in his model that can evolve over time. Yakovlev indicates that given the current market conditions, investments in the fund beyond US$3 billion of capital could become more difficult and negatively affect expected fund returns. <...> Wellard, the manager of the marketing team and a partner with 30 years of marketing experience, explains to Yakovlev that these are complex technical issues that will muddy the marketing message. According to Wellard, the offering material should focus solely on the great track record of the fund. Yakovlev does not object because the fund has only US$100 million of capital, very far from the US$3 billion threshold."
      comment: "Yakovlev and Wellard have not appropriately disclosed a significant limitation associated with the investment product. Yakovlev believes this limitation, once reached, will materially affect the returns of the fund. Although the fund is currently far from the US$3 billion mark, current and prospective investors must be made aware of this capacity issue."
    - title: "Example 13 (Notification of Risks and Limitations)"
      text: "Brickell Advisers offers investment advisory services mainly to South American clients. Ramon, a risk analyst at Brickell, describes to clients how the firm uses value at risk (VaR) analysis to track the risk of its strategies. Ramon assures clients that the firm’s process of calculating a VaR at a 99% confidence level, using a 20-day holding period, and applying a methodology based on an ex ante Monte Carlo simulation is extremely effective. The firm has never had losses greater than those predicted by this VaR analysis."
      comment: "Ramon has not sufficiently communicated the risks associated with the investment process to satisfy the requirements of Standard V(B). The losses predicted by a VaR analysis depend greatly on the inputs used in the model. The size and probability of losses can differ significantly from what an individual model predicts. Ramon must disclose how the inputs were selected and the potential limitations and risks associated with the investment strategy."
  - name: "V(C) Record Retention"
    tag: "5c"
    text: "Members and Candidates must develop and maintain appropriate records to support their investment analyses, recommendations, actions, and other investment-related communications with clients and prospective clients."
    examples:
    - title: "Example 1 (Record Retention and IPS Objectives and Recommendations)"
      text: "One of Lindstrom’s clients is upset by the negative investment returns of his equity portfolio. The investment policy statement (IPS) for the client requires that the portfolio manager follow a benchmark-oriented approach. The benchmark for the client includes a 35% investment allocation to the technology sector. The client acknowledges that this allocation was appropriate, but over the past three years, technology stocks have suffered severe losses. The client complains to the investment manager for allocating so much money to this sector."
      comment: "For Lindstrom, having appropriate records is important to show that over the past three years, the portion of technology stocks in the benchmark index was 35%, as called for in the client’s IPS. To comply with Standard V(C), Lindstrom would have been required to retain the client’s IPS stating that the benchmark was appropriate for the client’s investment objectives. He would also have had to keep records indicating that the investment process was explained appropriately to the client and that the IPS was updated on a regular basis. By taking these actions, Lindstrom would have been in compliance with Standard V(C)."
    - title: "Example 2 (Record Retention and Research Process)"
      text: "Young is a research analyst who writes numerous reports rating companies in the luxury retail industry. His reports are based on a variety of sources, including interviews with company managers, manufacturers, and economists; on-site company visits; customer surveys; and secondary research from analysts covering related industries."
      comment: "Young must document and keep copies of all the information that goes into his reports, including the secondary or third-party research of other analysts. Failure to maintain such files would violate Standard V(C)."
    - title: "Example 3 (Records as Firm, Not Employee, Property)"
      text: "Blank develops an analytical model while he is employed by Buku Investment Management, LLP. While at the firm, he systematically documents the assumptions that make up the model and his reasoning behind the assumptions. As a result of the success of his model, Blank is hired as the head of the research department of one of Buku’s competitors. Blank takes copies of the records supporting his model to his new firm."
      comment: "The records created by Blank supporting the research model he developed at Buku are the records of Buku. Taking the documents with him to his new employer without Buku’s permission violates Standard V(C). To use the model in the future, Blank must recreate the records supporting his model at the new firm."
  - name: "VI(A) Avoid or Disclose Conflicts"
    tag: "6a"
    text: "Members and Candidates must avoid or make full and fair disclosure of all matters that could reasonably be expected to impair their independence and objectivity or interfere with respective duties to their clients, prospective clients, and employer. Members and Candidates must ensure that such disclosures are prominent, are delivered in plain language, and communicate the relevant information effectively."
    examples:
    - title: "Example 1 (Conflict of Interest and Business Relationships)"
      text: "Weiss is a research analyst with Williamsburg Company, a broker and investment banking firm. Williamsburg’s merger and acquisition department has represented Jimco, a conglomerate, in all of Jimco’s acquisitions for the last 20 years. From time to time, Williamsburg officers sit on the boards of directors of various Jimco subsidiaries. Weiss is writing a research report on Jimco."
      comment: "Weiss must disclose in his research report Williamsburg’s special relationship with Jimco. Broker/dealer management of and participation in public offerings must be disclosed in research reports. Because the position of underwriter to a company entails a special past and potential future relationship with a company that is the subject of investment advice, it threatens the independence and objectivity of the report writer and must be disclosed."
    - title: "Example 2 (Conflict of Interest and Business Stock Ownership)"
      text: "The investment management firm of Dover & Roe sells a 25% interest in its partnership to a multinational bank holding company, First of New York. Immediately after the sale, Hobbs, president of Dover & Roe, changes her recommendation for First of New York’s common stock from “sell” to “buy” and adds First of New York’s commercial paper to Dover & Roe’s approved list for purchase."
      comment: "Best practice would be for Hobbs to discontinue research coverage of First of New York because the new ownership interest in this company creates a conflict of interest. At minimum, Hobbs must disclose the new relationship with First of New York to all Dover & Roe clients. Hobbs must also require the ownership interest to be disclosed to clients by the firm’s portfolio managers when they make specific investment recommendations or take investment actions with respect to First of New York’s securities."
    - title: "Example 3 (Conflict of Interest and Personal Stock Ownership)"
      text: "Fargmon, a research analyst who follows firms producing office equipment, has been recommending the purchase of stock in Kincaid Printing because of its innovative new line of copiers. After his initial report on the company, Fargmon’s wife inherits from a distant relative US$3 million of Kincaid stock. One year after his initial report on the company, Fargmon is asked to write a follow-up report on Kincaid."
      comment: "At minimum, Fargmon must disclose his wife’s ownership of Kincaid stock to his employer and in his follow-up report. Best practice is to avoid the conflict by asking his employer to assign another analyst to draft the follow-up report."
    - title: "Example 4 (Conflict of Interest and Personal Stock Ownership)"
      text: "Roberts is speculating in penny stocks for her own account and purchases 100,000 shares of Drew Mining, Inc., for US$0.30 a share. She intends to sell these shares at the sign of any substantial upward price movement of the stock. A week later, her employer asks her to write a report on penny stocks in the mining industry to be published in two weeks. Even without owning the Drew stock, Roberts would recommend it in her report as a “buy.” A surge in the price of the stock to the US$2 range is likely to result once the report is issued."
      comment: "Roberts must disclose the conflict to her employer and should consider declining the research assignment on Drew Mining. If Roberts’s employer has her write the report despite the conflict, Roberts must disclose the conflict in her report."
    - title: "Example 5 (Conflict of Interest and Compensation Arrangements)"
      text: "Snead, a portfolio manager for Thomas Investment Counsel, LLC, specializes in managing public retirement funds and defined benefit pension plan accounts, all of which have long-term investment objectives. A year ago, Snead’s employer, in an attempt to motivate and retain key investment professionals, introduced a bonus compensation system that rewards portfolio managers on the basis of quarterly performance relative to their peers and to certain benchmark indexes. To improve the short-term performance of her accounts, Snead changes her investment strategy and purchases several high-beta stocks for client portfolios. These purchases are seemingly contrary to the clients’ investment policy statements (IPSs). No change in objective or strategy has been recommended by Snead during the year."
      comment: "Snead violated Standard VI(A) by failing to inform her clients of the changes in her compensation arrangement with her employer, which created a conflict of interest between her compensation and her clients’ IPSs. Firms may pay employees based on performance, but pressure by Thomas Investment Counsel to achieve short-term performance goals conflicts with the requirement to take only investment actions that are consistent with the objectives of Snead’s accounts."
    - title: "Example 6 (Conflict of Interest and Compensation Arrangements)"
      text: "Carter is a representative with Bengal International, a registered broker/dealer. A stock promoter for Badger Company offers to pay Carter additional compensation for sales of Badger Company’s stock to Carter’s clients. Carter accepts the stock promoter’s offer but does not disclose the arrangement to his clients or to his employer. Carter sells shares of Badger stock to his clients."
      comment: "Carter violated Standard VI(A) by failing to disclose to clients that he is receiving additional compensation for recommending and selling Badger stock. At minimum, Carter must disclose the arrangement with Badger to his clients so they can evaluate whether Carter’s recommendations to buy Badger were affected by this arrangement. Best practice is for Carter to avoid this conflict of interest altogether by declining the offer of additional compensation from Badger Company."
    - title: "Example 7 (Conflict of Interest and Requested Favors)"
      text: "Papis is the chief investment officer of his state’s retirement fund. The fund has always used external managers for the real estate allocation, and this information is clearly presented in all fund communications. Nagle, a recognized sell-side research analyst and Papis’s business school classmate, recently left the investment bank he worked for to start his own asset management firm, Accessible Real Estate. Nagle is trying to build his assets under management, and he contacts Papis about gaining some of the retirement fund’s real estate allocation. In the previous few years, the performance of the retirement fund’s real estate investments was in line with the fund’s benchmark but was not extraordinary. Papis decides to help out his old friend and also to seek better returns by moving the real estate allocation to Accessible. The only notice of the change in managers appears in the next annual report in the listing of external managers."
      comment: "Papis violated Standard VI(A) by not disclosing to his employer his personal relationship with Nagle. Disclosure of his history with Nagle would allow his firm to determine whether the conflict may have impaired Papis’s independence in deciding to change external managers."
  - name: "VI(B) Priority of Transactions"
    tag: "6b"
    text: "Investment transactions for clients and employers must have priority over investment transactions in which a Member or Candidate is the beneficial owner."
    examples:
    - title: "Example 1 (Personal Trading)"
      text: "Long, a research analyst, does not recommend purchase of a common stock for his employer’s pension account, because he wants to purchase the stock personally and does not want to wait until the recommendation is approved and the stock is purchased by his employer."
      comment: "Long violated Standard VI(B) by taking advantage of his knowledge of the stock’s value before allowing his employer to benefit from that information."
    - title: "Example 2 (Trading for a Family Member’s Account)"
      text: "Baker, the portfolio manager of an aggressive growth mutual fund, maintains an account in her husband’s name at several brokerage firms with which the fund and a number of Baker’s other individual clients conduct a substantial amount of business. Whenever a hot issue becomes available, she instructs the brokers to buy it for her husband’s account. Because such issues normally are scarce, Baker often acquires shares in hot issues but her clients are not able to participate in them."
      comment: "Baker violated Standard VI(B). To comply with the standard, Baker must acquire shares for her mutual fund first before acquiring them for her husband’s account. She also must disclose the trading for her husband’s account to her employer because this activity creates a conflict between her personal interests and her employer’s interests."
    - title: "Example 3 (Family Accounts as Equals)"
      text: "Toffler, a portfolio manager at Esposito Investments, manages the retirement account established with the firm by her parents. Whenever IPOs become available, she first allocates shares to all her other clients for whom the investment is appropriate; then, she places any remaining portion in her parents’ account, if the issue is appropriate for them. She adopted this procedure so that no one can accuse her of favoring her parents."
      comment: "Toffler violated Standard VI(B) by breaching her duty to her parents by treating them differently from her other accounts simply because of the family relationship. As fee-paying clients of Esposito Investments, Toffler’s parents are entitled to the same treatment as any other client of the firm. If Toffler has beneficial ownership in the account, however, and Esposito Investments has preclearance and reporting requirements for personal transactions, she may have to preclear the trades and report the transactions to Esposito."
    - title: "Example 4 (Personal Trading and Disclosure)"
      text: "Michaels is an entry-level employee who works for both the research department and the investment management department of an active investment management firm. George, the director of the investment management department, who has responsibility for monitoring the personal stock transactions of all employees, discovers that Michaels has made substantial investment gains by purchasing stocks just before they were put on the firm’s recommended “buy” list. Michaels regularly declined to complete the firm’s quarterly personal transaction form."
      comment: "Michaels violated Standard VI(B) by placing personal transactions ahead of client transactions. In addition, George violated Standard IV(C) Responsibilities of Supervisors by not requiring Michaels to complete the quarterly personal transaction form."
    - title: "Example 5 (Trading Prior to Report Dissemination)"
      text: "Wilson, a brokerage’s insurance analyst, makes an internal video conference presentation to her firm’s branches around the country. During the broadcast, she includes negative comments about a major company in the insurance industry. The following day, Wilson’s follow-up written report is printed and distributed to the sales force and public customers. The report recommends that both short-term traders and intermediate investors take profits by selling the insurance company’s stock. Seven minutes after the video conference, however, Riley, the head of the firm’s trading department, closed out a long “call” position in the stock. Shortly thereafter, Riley established a sizable “put” position in the stock. When asked about her activities, Riley claimed she took the actions to facilitate anticipated sales by institutional clients."
      comment: "Riley violated Standard VI(B) by not giving customers an opportunity to buy or sell in the options market before the firm itself did. By taking action before the report was disseminated, Riley’s firm may have depressed the price of the calls and increased the price of the puts. Riley should have avoided the conflict of interest by waiting to trade for the firm’s own accounts until its clients had an opportunity to receive and assimilate Wilson’s recommendations."
  - name: "VI(C) Referral Fees"
    tag: "6c"
    text: "Members and Candidates must disclose to their employer, clients, and prospective clients, as appropriate, any compensation, consideration, or benefit received from or paid to others for the recommendation of products or services."
    examples:
    - title: "Example 1 (Disclosure of Referral Arrangements and Outside Parties)"
      text: "Brady Securities, Inc., a broker/dealer, has established a referral arrangement with Lewis Brothers, Ltd., an investment management firm. In this arrangement, Brady Securities refers all prospective tax-exempt accounts, including pension, profit-sharing, and endowment accounts, to Lewis Brothers. In return, Lewis Brothers makes available to Brady Securities on a regular basis the security recommendations and reports of its research staff, which registered representatives of Brady Securities use in serving customers. In addition, Lewis Brothers conducts monthly economic and market reviews for Brady Securities personnel and directs all stock commission business generated by referral accounts to Brady Securities. <...> White, a partner at Lewis Brothers, calculates that the incremental costs involved in functioning as the research department of Brady Securities are US$200,000 annually. Referrals from Brady Securities last year resulted in fee income of US$1.8 million for Lewis Brothers, and directing all stock trades through Brady Securities resulted in additional costs to Lewis Brothers’ clients of US$100,000. <...> Branch, the chief financial officer of Maxwell Inc., is seeking an investment manager for Maxwell’s profit-sharing plan and contacts White about Lewis Brothers’ investment management services. She tells White that her friend at Brady Securities, Hill, recommended Lewis Brothers without qualification. White secures Maxwell as a new client but does not disclose his firm’s referral arrangement with Brady Securities."
      comment: "White violated Standard VI(C) by failing to inform the prospective customer of the referral fee arrangement with commissions paid to Brady Securities. Such disclosure could have caused Branch to reassess Hill’s recommendation and make a more critical evaluation of Lewis Brothers’ services."
    - title: "Example 2 (Disclosure of Interdepartmental Referral Arrangements)"
      text: "Handley works for the trust department of Central Trust Bank. He receives compensation for each referral he makes to Central Trust’s brokerage department and personal financial management department that results in a sale. He refers several of his clients to the personal financial management department but does not disclose the arrangement at Central Trust to his clients."
      comment: "Handley violated Standard VI(C) by not disclosing the referral arrangement at Central Trust Bank to his clients. Standard VI(C) does not distinguish between referral payments paid by a third party for referring clients to the third party and internal payments paid within a firm to attract new business to a subsidiary. Members and candidates must disclose all such referral fees. Therefore, Handley is required to disclose, at the time of referral, any referral fee agreement in place among Central Trust Bank’s departments. The disclosure must include the nature and the value of the benefit."
    - title: "Example 3 (Disclosure of Referral Arrangements and Informing Firm)"
      text: "Roberts is a portfolio manager at Katama Investments, an advisory firm specializing in managing assets for high-net-worth individuals. Katama’s trading desk uses a variety of brokerage houses to execute trades on behalf of its clients. Roberts asks the trading desk to direct a large portion of its commissions to Naushon, Inc., a small broker/dealer run by one of Roberts’s business school classmates. Katama’s traders have found that Naushon is not very competitive on pricing, and although Naushon generates some research for its trading clients, Katama’s other analysts have found most of Naushon’s research to be not especially useful. Nevertheless, the traders do as Roberts asks, and in return for receiving a large portion of Katama’s business, Naushon recommends the investment services of Roberts and Katama to its wealthiest clients. This arrangement is not disclosed to either Katama or the clients referred by Naushon."
      comment: "Roberts is violating Standard VI(C) by failing to inform her employer and clients of the referral arrangement."
    - title: "Example 4 (Disclosure of Referral Arrangements and Outside Parties)"
      text: "The state employee pension plan is seeking to hire a firm to manage the pension plan’s emerging market allocation. To assist in the review process, the plan hires Arronski as a consultant to solicit proposals from various advisers. Arronski is contracted by the plan to represent its best interest in selecting the most appropriate new manager. The process runs smoothly, and Overseas Investments is selected as the new manager. <...> The following year, it comes to light that Arronski charges fees to investment managers that he recommends if they are awarded new pension allocations. Although the plan is happy with the performance of Overseas since it has been managing the plan’s emerging market funds, the plan still decides to have an independent review of the proposals and the selection process to ensure that Overseas is the appropriate firm for its needs. This review confirms that, even though Arronski was paid by both the plan and Overseas, the recommendation of Overseas appeared to be objective and appropriate."
      comment: "Arronski violated Standard VI(C) because he did not disclose the fee being paid by Overseas. Withholding the information that firms pay Arronski once they are awarded business based on his recommendations implies a potential lack of objectivity in the recommendation of Overseas by Arronski."
  - name: "VII(A) Conduct as Participants in CFA Institute Programs"
    tag: "7a"
    text: "Members and Candidates must not engage in any conduct that compromises the reputation or integrity of CFA Institute or the CFA designation or the integrity, validity, or security of CFA Institute programs."
    examples:
    - title: "Example 1 (Sharing Exam Questions)"
      text: "Nero, a candidate for the CFA designation, recently found what appears to be a copy of the Level II CFA exam. Although he is not sure whether it is authentic, he posts some of the questions in an online chatroom frequented by other candidates for the CFA designation. Two other Level II candidates in the chatroom ask Nero to post more questions, which he does. All three use the questions to prepare for their upcoming exam."
      comment: "Nero and the two candidates violated Standard VII(A). By giving information about the CFA exam questions to two candidates, Nero provided an unfair advantage to the two candidates and undermined the integrity and validity of the Level II CFA exam as an accurate measure of the knowledge, skills, and abilities necessary to earn the right to use the CFA designation. By soliciting and accepting the information, the two other candidates also compromised the integrity and validity of the Level II CFA exam and undermined the ethical framework that is a key part of the designation."
    - title: "Example 2 (Filing a Fraudulent Deferral Request to Postpone Exam Date)"
      text: "Chiu is a candidate for the CFA designation and is registered to take the Level I CFA exam during the upcoming open exam window. As the date gets closer, Chiu realizes that she is not prepared to take the exam. According to CFA Institute policies in effect at the time, Chiu can request a Paid Deferral, but she notices that the Emergency Deferral option is free, so she files an Emergency Deferral request claiming that her uncle died. CFA Institute denies her request since the death of an uncle is not a valid basis for an Emergency Deferral under the current rules. In response, Chiu files a second request claiming that her mother died. The death certificate she submits with her new request is identical to her first request, except the name of the deceased has been changed. Later, Chiu admits that there had been no deaths and that the documentation was altered in an attempt to obtain an Emergency Deferral to save money."
      comment: "By filing a fraudulent request for an Emergency Deferral, Chiu violated rules of the CFA Program and compromised the integrity of the CFA exam. As a result, her conduct violated Standard VII(A), in addition to Standard I(C) Misrepresentation."
    - title: "Example 3 (Disruptive Conduct at Test Center)"
      text: "Hermosa is a candidate for the CFA designation and is registered to take the Level III CFA exam at a test center in his city. On his scheduled exam day, he arrives at the test center. During the check-in process, he refuses to cooperate with the proctor when asked to show that his pants pockets are empty. He becomes agitated, shouts profanity, throws his passport at the proctor, and threatens her with bodily harm. Several other CFA candidates in the test center at the time complain that the incident interrupted their testing experience and that they were concerned for their safety as a result of Hermosa’s conduct."
      comment: "Hermosa’s conduct violated Standard VII(A) because he violated testing rules and compromised the integrity and security of the CFA exam."
    - title: "Example 4 (Bringing Written Material into Computer-Based Testing Centers)"
      text: "Yu is a candidate for the CFA designation and is registered to take the Level I CFA exam. She has difficulty remembering formulas, so prior to entering the computer-based testing (CBT) center, she writes several formulas on a piece of paper and hides it in one of her shirt sleeves. During the exam, a proctor notices Yu removing the paper from her sleeve. The proctor approaches Yu and confiscates the paper."
      comment: "Because Yu took written information into the CBT exam room, her conduct violated the testing rules and compromised the security and integrity of the CFA exam and the validity of her exam performance. Therefore, she violated Standard VII(A)."
    - title: "Example 5 (Looking at Other Workstation Screens during CBT Exams)"
      text: "Sharma is a candidate for the CFA designation. He is at a CBT center taking the Level II CFA exam. The testing rules prohibit looking at other candidates’ screens. Sharma’s mind wanders during the exam, and he briefly reminisces about the past—when the exams were on paper instead of on a computer. He wonders if his test is the same as that of the test taker sitting next to him, who is also taking the Level II CFA exam. He looks multiple times at the computer screen of the test taker next to him. His conduct is observed by a CBT proctor and is captured by video surveillance."
      comment: "Sharma’s conduct violated Standard VII(A) because he violated testing rules and compromised the validity, integrity, and security of the CFA exam."
    - title: "Example 6 (Sharing Exam Content)"
      text: "After completing the Level II CFA exam, Rossi posts online about her experience. Her post reads, “Level II is complete! I think I did fairly well on the exam. It was really difficult but fair. I think I did especially well on the derivatives questions. And there were tons of them! I think I counted 18! The ethics questions were really hard. I’m glad I spent so much time on the Code and Standards. I was surprised to see there were no questions at all about IPO allocations. I expected there to be a couple. Well, off to celebrate getting through it. See you tonight?”"
      comment: "Rossi did not violate Standard VII(A) when she wrote about how difficult she found the exam or how well she thinks she may have done. By revealing portions of the exam content covered on the exam and areas not covered, however, she did violate Standard VII(A). Depending on the time frame in which the comments were posted, Rossi not only may have assisted future candidates but also may have provided an unfair advantage to candidates yet to sit for the same exam, thereby undermining the integrity and validity of the exam."
    - title: "Example 7 (Sharing Exam Content)"
      text: "Level I candidate Gagne has been a frequent visitor to an internet forum designed specifically for candidates for the CFA designation. The week after completing the Level I CFA exam, Gagne and several others begin a discussion thread on the forum about the most challenging questions and attempt to determine the correct answers."
      comment: "Gagne violated Standard VII(A) by providing confidential exam information, which compromises the integrity of the exam process. In trying to determine correct answers to specific questions, the group’s discussion included question-specific details considered to be confidential."
    - title: "Example 8 (Sharing Exam Content)"
      text: "CFA4Sure is a company that produces test-preparation materials for CFA Program candidates. Many candidates register for and use the company’s products. The day after the CFA exam, CFA4Sure sends an email to all its customers asking them to share with the company the hardest questions from the exam so that CFA4Sure can better prepare its customers for the next exam administration. Pena emails a summary of the questions she found most difficult on the exam."
      comment: "Pena violated Standard VII(A) by disclosing exam questions. The information provided is considered confidential until publicly released by CFA Institute. CFA4Sure is likely to use such feedback to refine its review materials for future candidates. Pena’s sharing of the specific questions undermined the integrity of the exam while potentially making the exam easier for future candidates. <...> If the CFA4Sure employees who participated in the solicitation of confidential CFA Program information are CFA Institute members or candidates, they also violated Standard VII(A)."
    - title: "Example 9 (Discussion of Exam Grading Guidelines and Results)"
      text: "As a condition of participating in grading CFA exams, Whitcomb agrees not to reveal or discuss the exam materials with anyone except CFA Institute staff or other graders. Several weeks after the conclusion of the CFA exam grading process, Whitcomb tells several colleagues who are candidates for the CFA designation which question he graded. He also discusses the guideline answer and adds that few candidates scored well on the question."
      comment: "Whitcomb violated Standard VII(A) by disclosing information related to a specific question on the exam, which compromised theintegrity of the exam process.
    - title: "Example 10 (Compromising CFA Institute Integrity as a Volunteer)"
      text: "Ramirez is an investor relations consultant for several small companies that are seeking greater exposure to investors. He is also the program chair for the CFA Institute local society in the city where he works. Ramirez schedules only companies that are his clients to make presentations to the society and excludes other companies."
      comment: "By using his volunteer position at CFA Institute to benefit himself and his clients, Ramirez is compromising the reputation and integrity of CFA Institute and thus is violating Standard VII(A)."
    - title: "Example 11 (Compromising CFA Institute Integrity as a Volunteer)"
      text: "Warrenski is a member of the CFA Institute GIPS Standards Technical Committee, which provides technical oversight and guides development of the GIPS standards. As a member of the committee, she has advance knowledge of confidential information regarding the GIPS standards, including any new or revised standards the committee is considering. She tells her clients that her committee membership will allow her to better assist them in keeping up with changes to the GIPS standards and facilitating their compliance with the changes."
      comment: "Warrenski used her association with the GIPS Standards Technical Committee to promote her firm’s services to clients and potential clients. In stating that her volunteer position at CFA Institute provides a strategic business advantage over competing firms and implying to clients that she would use confidential information to further their interests, Warrenski compromised the reputation and integrity of CFA Institute and thus violated Standard VII(A). She may factually state her involvement with the committee but cannot infer any special advantage to her clients from such participation."
  - name: "VII(B) Reference to CFA Institute, the CFA Designation, and the CFA Program"
    tag: "7b"
    text: "When referring to CFA Institute, CFA Institute membership, the CFA designation, or candidacy in the CFA Program, Members and Candidates must not misrepresent or exaggerate the meaning or implications of membership in CFA Institute, holding the CFA designation, or candidacy in the CFA Program."
    examples:
    - title: "Example 1 (Passing Exams in Consecutive Attempts)"
      text: "Zonder drafts and publishes an advertisement for her firm, AZ Investment Advisers, which states that all the firm’s principals are CFA charterholders and all passed the three examinations on their first attempt. The advertisement prominently links this fact to the notion that AZ’s mutual funds have achieved superior performance."
      comment: "Zonder may state that all AZ principals passed the three examinations on the first try as long as this statement is true, but it must not be linked to performance or imply superior ability. Implying that (1) CFA charterholders achieve better investment results and (2) those who pass the exams on the first try may be more successful than those who do not violates Standard VII(B)."
    - title: "Example 2 (Right to Use CFA Designation)"
      text: "Five years after receiving his CFA charter, Vasseur resigns his position as an investment analyst and spends the next two years traveling abroad. Because he is not actively engaged in the investment profession, he does not file a completed Professional Conduct Statement with CFA Institute and does not pay his CFA Institute membership dues. As a result, his CFA Institute membership has lapsed. At the conclusion of his travels, Vasseur becomes a self-employed analyst accepting assignments as an independent contractor. Without reinstating his CFA Institute membership, he prints business cards that display “CFA” after his name."
      comment: "Vasseur violated Standard VII(B) by misrepresenting his status as a charterholder because he is no longer a CFA Institute member with the right to use the CFA designation. Therefore, he no longer is able to state or imply that he is a CFA charterholder. If he wants to reinstate his membership, he needs to complete the appropriate process and meet the requirements for reinstatement established by CFA Institute."
    - title: "Example 3 (“Retired” CFA Institute Membership Status)"
      text: "After a 25-year career, Simpson retires from his firm. Because he is not actively engaged in the investment profession, he does not file a completed Professional Conduct Statement with CFA Institute and does not pay his CFA Institute membership dues. Simpson designs a plain business card (without a corporate logo) to hand out to friends with his new contact details, and he continues to put “CFA” after his name."
      comment: "By misrepresenting his status as a charterholder, Simpson violated Standard VII(B). Because he failed to meet the requirements for membership established by CFA Institute, his membership lapsed and he has given up the right to use the CFA designation. CFA Institute has procedures, however, for reclassifying a member and charterholder as “retired” and reducing the annual dues. If he wants to obtain retired status, he needs to complete the appropriate process and meet the requirements for retired status established by CFA Institute."
    - title: "Example 4 (Stating Facts about the CFA Designation)"
      text: "Reese has been a CFA charterholder since 2000. In a conversation with a friend who is considering enrolling to be a candidate for the CFA designation, she states that she learned a great deal as a CFA candidate and that many firms require their employees to be CFA charterholders. She would recommend the CFA Program to anyone pursuing a career in investment management."
      comment: "Reese’s comments comply with Standard VII(B). Her statements refer to facts: Earning her CFA designation enhanced her knowledge, and many firms require the CFA designation for their investment professionals."
    - title: "Example 5 (Use of Fictitious Name)"
      text: "Glass is the lead quantitative analyst at CityCenter Hedge Fund. Glass is responsible for the development, maintenance, and enhancement of the proprietary models the fund uses to manage its investors’ assets. Glass wants to comment on an article posted on an investor blog. His comment will contain information related to his work that he believes will be helpful to investors. However, he does not want to reveal his identity, so he publishes the comment with the signature line, “Expert, CFA.”"
      comment: "Using a fictitious name or pseudonym to hide one’s true identity while still claiming to be a charterholder is a misrepresentation and an improper use of the designation. By using “Expert, CFA,” Glass violated Standard VII(B)."
